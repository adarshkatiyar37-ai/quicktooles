<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Base64 to Image Converter Online - Free Tool | WebTools</title>
<meta name="description" content="Convert Base64 image string to image online for free. Easy-to-use Base64 to Image converter tool for developers, designers, and creators.">
<meta name="keywords" content="base64 to image, convert base64 image, online base64 image converter, free tool">
<meta name="robots" content="index, follow">

<link rel="stylesheet" href="../style.css">

<style>
.tool-container{
    max-width:800px;
    margin:80px auto;
    background:#1e293b;
    padding:30px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    text-align:center;
}

.tool-container h1{
    margin-bottom:20px;
}

textarea{
    width:100%;
    height:150px;
    padding:12px;
    border:none;
    border-radius:6px;
    margin-bottom:15px;
    font-size:15px;
}

button{
    padding:12px 20px;
    background:#3b82f6;
    border:none;
    color:white;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
    margin-right:10px;
}

button:hover{
    background:#2563eb;
}

.result{
    margin-top:20px;
}

.result img{
    max-width:100%;
    margin-top:15px;
    border-radius:8px;
}

.related-tools{
    margin-top:40px;
    text-align:left;
}

.related-tools ul{
    list-style:none;
    padding:0;
}

.related-tools ul li{
    margin-bottom:10px;
}

.related-tools ul li a{
    color:#3b82f6;
    text-decoration:none;
}

.related-tools ul li a:hover{
    text-decoration:underline;
}
</style>
</head>

<body>

<header class="navbar">
    <h2 class="logo">WebTools</h2>
    <nav>
        <a href="../index.html">Home</a>
        <a href="../index.html">All Tools</a>
    </nav>
</header>

<div class="tool-container">

<h1>🖼 Base64 to Image Converter</h1>

<p>Paste your Base64 image string below</p>

<textarea id="base64Input" placeholder="Enter Base64 image code..."></textarea>

<button onclick="convertImage()">Convert</button>
<button onclick="clearText()">Clear</button>

<div class="result" id="result"></div>

<div class="related-tools">
    <h2>Related Tools</h2>
    <ul>
        <li><a href="image-to-base64.html">Image to Base64 Converter</a></li>
        <li><a href="base64-encoder.html">Base64 Encoder</a></li>
        <li><a href="base64-decoder.html">Base64 Decoder</a></li>
    </ul>
</div>

</div>

<script>
function convertImage(){
    let base64=document.getElementById("base64Input").value.trim();
    if(!base64){
        document.getElementById("result").innerHTML="Please enter Base64 image data";
        return;
    }
    let img=document.createElement("img");
    img.src="data:image/png;base64,"+base64;
    document.getElementById("result").innerHTML="";
    document.getElementById("result").appendChild(img);
}

function clearText(){
    document.getElementById("base64Input").value="";
    document.getElementById("result").innerHTML="";
}
</script>

</body>
</html>
