<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Case Converter Online - Uppercase, Lowercase, Capitalize | WebTools</title>
<meta name="description" content="Convert text to uppercase, lowercase, capitalize, and sentence case online for free. Easy-to-use Case Converter tool for writers, students, and developers.">
<meta name="keywords" content="case converter, uppercase, lowercase, capitalize, sentence case, online text tool, free tool">
<meta name="robots" content="index, follow">

<link rel="stylesheet" href="../style.css">

<style>
.tool-container{
    max-width:600px;
    margin:80px auto;
    background:#1e293b;
    padding:30px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    text-align:center;
}

.tool-container h1{
    margin-bottom:20px;
}

textarea{
    width:100%;
    height:150px;
    padding:12px;
    border:none;
    border-radius:6px;
    margin-bottom:15px;
    font-size:16px;
}

button{
    padding:12px 20px;
    margin:5px;
    border:none;
    border-radius:6px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
    font-size:15px;
}

button:hover{
    background:#2563eb;
}

.result{
    margin-top:20px;
    background:#0f172a;
    padding:15px;
    border-radius:6px;
    min-height:50px;
    word-wrap:break-word;
}

.related-tools{
    margin-top:40px;
    text-align:left;
}

.related-tools ul{
    list-style:none;
    padding:0;
}

.related-tools ul li{
    margin-bottom:10px;
}

.related-tools ul li a{
    color:#3b82f6;
    text-decoration:none;
}

.related-tools ul li a:hover{
    text-decoration:underline;
}
</style>
</head>

<body>

<header class="navbar">
    <h2 class="logo">WebTools</h2>
    <nav>
        <a href="../index.html">Home</a>
        <a href="../index.html">All Tools</a>
    </nav>
</header>

<div class="tool-container">

<h1>🔤 Case Converter</h1>

<p>Convert your text to Uppercase, Lowercase, Capitalize, or Sentence case</p>

<textarea id="inputText" placeholder="Enter your text here..."></textarea>

<br>

<button onclick="toUpper()">UPPERCASE</button>
<button onclick="toLower()">lowercase</button>
<button onclick="toCapitalize()">Capitalize</button>
<button onclick="toSentence()">Sentence case</button>

<div class="result" id="result"></div>

<div class="related-tools">
    <h2>Related Tools</h2>
    <ul>
        <li><a href="text-reverser.html">Text Reverser</a></li>
        <li><a href="text-sorter.html">Text Sorter</a></li>
        <li><a href="remove-spaces.html">Remove Extra Spaces</a></li>
    </ul>
</div>

</div>

<script>
function toUpper(){
    let text=document.getElementById("inputText").value;
    document.getElementById("result").innerText=text.toUpperCase();
}

function toLower(){
    let text=document.getElementById("inputText").value;
    document.getElementById("result").innerText=text.toLowerCase();
}

function toCapitalize(){
    let text=document.getElementById("inputText").value;
    let words=text.toLowerCase().split(" ");
    for(let i=0;i<words.length;i++){
        words[i]=words[i].charAt(0).toUpperCase()+words[i].slice(1);
    }
    document.getElementById("result").innerText=words.join(" ");
}

function toSentence(){
    let text=document.getElementById("inputText").value.toLowerCase();
    let result=text.charAt(0).toUpperCase()+text.slice(1);
    document.getElementById("result").innerText=result;
}
</script>

</body>
</html>
