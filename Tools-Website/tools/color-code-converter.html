<script>
function hexToRgb(hex){
    hex = hex.replace("#","");
    let r=parseInt(hex.substring(0,2),16);
    let g=parseInt(hex.substring(2,4),16);
    let b=parseInt(hex.substring(4,6),16);
    return {r,g,b};
}

function rgbToHsl(r,g,b){
    r/=255; g/=255; b/=255;
    let max=Math.max(r,g,b), min=Math.min(r,g,b);
    let h,s,l=(max+min)/2;

    if(max==min){
        h=s=0;
    } else {
        let d=max-min;
        s=l>0.5 ? d/(2-max-min) : d/(max+min);
        switch(max){
            case r: h=(g-b)/d+(g<b?6:0); break;
            case g: h=(b-r)/d+2; break;
            case b: h=(r-g)/d+4; break;
        }
        h/=6;
    }
    return {h:Math.round(h*360), s:Math.round(s*100), l:Math.round(l*100)};
}

function convertColor(){
    let hex=document.getElementById("colorInput").value.trim();
    if(!hex.startsWith("#") || hex.length!=7){
        alert("Enter valid HEX code (example: #ff0000)");
        return;
    }
    let rgb=hexToRgb(hex);
    let hsl=rgbToHsl(rgb.r,rgb.g,rgb.b);

    document.getElementById("preview").style.background=hex;
    document.getElementById("hex").innerText=hex;
    document.getElementById("rgb").innerText=`rgb(${rgb.r}, ${rgb.g}, ${rgb.b})`;
    document.getElementById("hsl").innerText=`hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)`;
}
</script>
