<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CSS Minifier - WebTools</title>
<meta name="description" content="Minify your CSS code easily with this free online CSS Minifier. Reduce CSS file size for faster loading and optimization.">
<meta name="keywords" content="CSS minifier, online CSS minify, compress CSS, CSS optimizer, web tools">
<meta name="robots" content="index, follow">

<link rel="stylesheet" href="../style.css">

<style>
.tool-container {
    max-width:700px;
    margin:80px auto;
    background:#1e293b;
    padding:30px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    text-align:center;
}

.tool-container h1 {
    text-align:center;
    margin-bottom:20px;
}

textarea {
    width:100%;
    height:160px;
    padding:12px;
    border:none;
    border-radius:6px;
    margin-top:15px;
    font-family:monospace;
}

button {
    margin-top:15px;
    padding:12px 20px;
    border:none;
    border-radius:6px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#2563eb;
}

.result{
    margin-top:20px;
    background:#0f172a;
    padding:15px;
    border-radius:6px;
    min-height:80px;
    text-align:left;
    font-family:monospace;
    word-break: break-word;
}

.related-tools{
    margin-top:40px;
    text-align:left;
}

.related-tools ul{
    list-style:none;
    padding:0;
}

.related-tools ul li{
    margin-bottom:10px;
}

.related-tools ul li a{
    color:#3b82f6;
    text-decoration:none;
}

.related-tools ul li a:hover{
    text-decoration:underline;
}
</style>

</head>

<body>

<header class="navbar">
    <h2 class="logo">WebTools</h2>
    <nav>
        <a href="../index.html">Home</a>
        <a href="../index.html">All Tools</a>
    </nav>
</header>

<div class="tool-container">

<h1>🎯 CSS Minifier</h1>

<p>Paste your CSS code below and click Minify to compress it.</p>

<textarea id="cssInput" placeholder="Paste your CSS here..."></textarea>

<br>

<button onclick="minifyCSS()">Minify CSS</button>

<div class="result" id="result"></div>

<div class="related-tools">
    <h2>Related Tools</h2>
    <ul>
        <li><a href="html-minifier.html">HTML Minifier</a></li>
        <li><a href="js-minifier.html">JS Minifier</a></li>
    </ul>
</div>

</div>

<script>
function minifyCSS(){
    let css=document.getElementById("cssInput").value;

    // Remove comments
    css=css.replace(/\/\*[\s\S]*?\*\//g,''); 
    // Remove unnecessary whitespaces
    css=css.replace(/\s+/g,' ');
    css=css.replace(/\s*{\s*/g,'{');
    css=css.replace(/\s*}\s*/g,'}');
    css=css.replace(/\s*;\s*/g,';');
    css=css.replace(/\s*:\s*/g,':');
    css=css.trim();

    document.getElementById("result").innerText=css;
}
</script>

</body>
</html>
