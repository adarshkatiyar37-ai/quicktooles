<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Duplicate Line Remover - WebTools</title>
<meta name="description" content="Remove duplicate lines from your text easily with this free online Duplicate Line Remover tool.">
<meta name="keywords" content="duplicate line remover, remove duplicates online, text tool, webtools">
<meta name="robots" content="index, follow">

<link rel="stylesheet" href="../style.css">

<style>
.tool-container {
    max-width:700px;
    margin:80px auto;
    background:#1e293b;
    padding:30px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    text-align:center;
}

.tool-container h1 {
    text-align:center;
    margin-bottom:20px;
}

textarea {
    width:100%;
    height:160px;
    padding:12px;
    border:none;
    border-radius:6px;
    margin-top:15px;
    resize:none;
    font-size:15px;
}

button {
    margin-top:15px;
    padding:12px 20px;
    border:none;
    border-radius:6px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
    font-size:16px;
}

button:hover {
    background:#2563eb;
}

.result{
    margin-top:20px;
    background:#0f172a;
    padding:15px;
    border-radius:6px;
    min-height:100px;
    white-space:pre-wrap;
    text-align:left;
    word-wrap:break-word;
}

.related-tools{
    margin-top:40px;
    text-align:left;
}

.related-tools ul{
    list-style:none;
    padding:0;
}

.related-tools ul li{
    margin-bottom:10px;
}

.related-tools ul li a{
    color:#3b82f6;
    text-decoration:none;
}

.related-tools ul li a:hover{
    text-decoration:underline;
}
</style>

</head>

<body>

<header class="navbar">
    <h2 class="logo">WebTools</h2>
    <nav>
        <a href="../index.html">Home</a>
        <a href="../index.html">All Tools</a>
    </nav>
</header>

<div class="tool-container">

<h1>📝 Duplicate Line Remover</h1>

<p>Paste text below to remove duplicate lines automatically.</p>

<textarea id="inputText" placeholder="Enter your text here..."></textarea>

<br>

<button onclick="removeDuplicates()">Remove Duplicate Lines</button>

<div class="result" id="result"></div>

<div class="related-tools">
    <h2>Related Tools</h2>
    <ul>
        <li><a href="text-sorter.html">Text Sorter</a></li>
        <li><a href="text-reverser.html">Text Reverser</a></li>
    </ul>
</div>

</div>

<script>
function removeDuplicates(){
    let text=document.getElementById("inputText").value;
    let lines=text.split("\n");
    let unique=[...new Set(lines)];
    document.getElementById("result").innerText=unique.join("\n");
}
</script>

</body>
</html>
