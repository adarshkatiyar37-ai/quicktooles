<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Image Color Picker - WebTools</title>
<meta name="description" content="Pick colors from any image using this free online Image Color Picker tool. Get HEX and RGB values easily.">
<meta name="keywords" content="Image Color Picker, color picker online, HEX color picker, RGB color picker">
<meta name="robots" content="index, follow">

<link rel="stylesheet" href="../style.css">

<style>
.tool-container {
    max-width:700px;
    margin:80px auto;
    background:#1e293b;
    padding:30px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    text-align:center;
}

.tool-container h1 {
    text-align:center;
    margin-bottom:20px;
}

input[type="file"] {
    margin-top:10px;
}

canvas {
    margin-top:20px;
    max-width:100%;
    border-radius:6px;
    cursor:crosshair;
}

.color-box {
    margin-top:20px;
    height:60px;
    border-radius:6px;
    border:2px solid #3b82f6;
}

.result {
    margin-top:15px;
    background:#0f172a;
    padding:12px;
    border-radius:6px;
    font-family:monospace;
    word-break: break-word;
}

.related-tools {
    margin-top:30px;
    text-align:left;
}

.related-tools ul {
    list-style:none;
    padding:0;
}

.related-tools ul li {
    margin-bottom:10px;
}

.related-tools ul li a {
    color:#3b82f6;
    text-decoration:none;
}

.related-tools ul li a:hover {
    text-decoration:underline;
}
</style>

</head>

<body>

<header class="navbar">
<h2 class="logo">WebTools</h2>
<nav>
<a href="../index.html">Home</a>
<a href="../index.html">All Tools</a>
</nav>
</header>

<div class="tool-container">

<h1>🎨 Image Color Picker</h1>

<p>Upload an image and click on it to get HEX and RGB values of any pixel.</p>

<input type="file" id="upload">

<canvas id="canvas"></canvas>

<div class="color-box" id="colorBox"></div>

<div class="result">
<p><b>HEX:</b> <span id="hex"></span></p>
<p><b>RGB:</b> <span id="rgb"></span></p>
</div>

<div class="related-tools">
<h2>Related Tools</h2>
<ul>
<li><a href="color-code-converter.html">Color Code Converter</a></li>
<li><a href="image-compressor.html">Image Compressor</a></li>
</ul>
</div>

</div>

<script>
const upload = document.getElementById("upload");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

upload.addEventListener("change", function(e) {
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function(event) {
        const img = new Image();
        img.onload = function() {
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
        }
        img.src = event.target.result;
    }

    reader.readAsDataURL(file);
});

canvas.addEventListener("click", function(e) {
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const pixel = ctx.getImageData(x, y, 1, 1).data;

    const r = pixel[0];
    const g = pixel[1];
    const b = pixel[2];

    const hex = "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);

    document.getElementById("colorBox").style.background = hex;
    document.getElementById("hex").innerText = hex;
    document.getElementById("rgb").innerText = `rgb(${r}, ${g}, ${b})`;
});
</script>

</body>
</html>
