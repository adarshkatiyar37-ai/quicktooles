<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Image Converter - WebTools</title>
<meta name="description" content="Convert images online between PNG, JPG, and WEBP formats. Free and easy Image Converter tool.">
<meta name="keywords" content="Image Converter, PNG to JPG, JPG to PNG, WEBP Converter, online image convert">
<meta name="robots" content="index, follow">

<link rel="stylesheet" href="../style.css">

<style>
.tool-container {
    max-width:700px;
    margin:80px auto;
    background:#1e293b;
    padding:30px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    text-align:center;
}

.tool-container h1 {
    text-align:center;
    margin-bottom:20px;
}

input[type="file"],
select {
    margin-top:10px;
    padding:8px;
    border-radius:6px;
    border:none;
    width:80%;
}

canvas {
    margin-top:20px;
    max-width:100%;
    border-radius:6px;
}

button {
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:6px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
}

button:hover {
    background:#2563eb;
}

a#download {
    display:block;
    margin-top:15px;
    color:#3b82f6;
    font-weight:bold;
}

.related-tools {
    margin-top:30px;
    text-align:left;
}

.related-tools ul {
    list-style:none;
    padding:0;
}

.related-tools ul li {
    margin-bottom:10px;
}

.related-tools ul li a {
    color:#3b82f6;
    text-decoration:none;
}

.related-tools ul li a:hover {
    text-decoration:underline;
}
</style>

</head>

<body>

<header class="navbar">
<h2 class="logo">WebTools</h2>
<nav>
<a href="../index.html">Home</a>
<a href="../index.html">All Tools</a>
</nav>
</header>

<div class="tool-container">

<h1>🖼 Image Converter</h1>

<p>Upload an image and convert it between PNG, JPG, or WEBP formats.</p>

<input type="file" id="upload">

<br>

<select id="format">
<option value="image/png">PNG</option>
<option value="image/jpeg">JPG</option>
<option value="image/webp">WEBP</option>
</select>

<br>

<button onclick="convertImage()">Convert Image</button>

<canvas id="canvas"></canvas>

<a id="download" style="display:none;">Download Converted Image</a>

<div class="related-tools">
<h2>Related Tools</h2>
<ul>
<li><a href="image-compressor.html">Image Compressor</a></li>
<li><a href="image-to-base64.html">Image to Base64</a></li>
<li><a href="image-resizer.html">Image Resizer</a></li>
</ul>
</div>

</div>

<script>
let img = new Image();

document.getElementById("upload").addEventListener("change", function(e){
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = function(event){
        img.src = event.target.result;
    }
    reader.readAsDataURL(file);
});

function convertImage(){
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = img.width;
    canvas.height = img.height;

    ctx.drawImage(img,0,0);

    let format = document.getElementById("format").value;
    let converted = canvas.toDataURL(format);

    let link = document.getElementById("download");
    link.href = converted;
    link.download = "converted-image";
    link.style.display = "block";
    link.innerText = "Download Converted Image";
}
</script>

</body>
</html>
