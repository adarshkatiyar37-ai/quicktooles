<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Image Rotator - WebTools</title>
<meta name="description" content="Rotate your images online for free. Use our Image Rotator tool to rotate images by 90°, 180°, or 270° and download the result.">
<meta name="keywords" content="Image Rotator, Rotate Image Online, Free Image Rotate, PNG Rotate, JPG Rotate">
<meta name="robots" content="index, follow">

<link rel="stylesheet" href="../style.css">

<style>
.tool-container {
    max-width:700px;
    margin:80px auto;
    background:#1e293b;
    padding:30px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    text-align:center;
}

.tool-container h1 {
    text-align:center;
    margin-bottom:20px;
}

canvas {
    margin-top:20px;
    max-width:100%;
    border-radius:6px;
}

input[type="file"] {
    margin-top:10px;
}

button {
    margin-top:10px;
    margin-right:5px;
    padding:10px 15px;
    border:none;
    border-radius:6px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
}

button:hover {
    background:#2563eb;
}

a#download {
    display:block;
    margin-top:15px;
    color:#3b82f6;
    font-weight:bold;
}

.related-tools {
    margin-top:30px;
    text-align:left;
}

.related-tools ul {
    list-style:none;
    padding:0;
}

.related-tools ul li {
    margin-bottom:10px;
}

.related-tools ul li a {
    color:#3b82f6;
    text-decoration:none;
}

.related-tools ul li a:hover {
    text-decoration:underline;
}
</style>

</head>

<body>

<header class="navbar">
<h2 class="logo">WebTools</h2>
<nav>
<a href="../index.html">Home</a>
<a href="../index.html">All Tools</a>
</nav>
</header>

<div class="tool-container">

<h1>🔄 Image Rotator</h1>

<p>Upload your image and rotate it by 90°, 180°, or 270°.</p>

<input type="file" id="upload">

<br>

<button onclick="rotate(90)">Rotate 90°</button>
<button onclick="rotate(180)">Rotate 180°</button>
<button onclick="rotate(270)">Rotate 270°</button>

<canvas id="canvas"></canvas>

<a id="download" style="display:none;">Download Rotated Image</a>

<div class="related-tools">
<h2>Related Tools</h2>
<ul>
<li><a href="image-resizer.html">Image Resizer</a></li>
<li><a href="image-cropper.html">Image Cropper</a></li>
<li><a href="image-compressor.html">Image Compressor</a></li>
<li><a href="image-converter.html">Image Converter</a></li>
</ul>
</div>

</div>

<script>
let img = new Image();
let angle = 0;

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

document.getElementById("upload").addEventListener("change", function(e){
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = function(event){
        img.src = event.target.result;
    }
    reader.readAsDataURL(file);
});

img.onload = function(){
    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img,0,0);
}

function rotate(deg){
    angle = deg * Math.PI / 180;

    // swap canvas width/height for 90° or 270° rotations
    if(deg === 90 || deg === 270){
        canvas.width = img.height;
        canvas.height = img.width;
    } else {
        canvas.width = img.width;
        canvas.height = img.height;
    }

    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.save();
    ctx.translate(canvas.width/2, canvas.height/2);
    ctx.rotate(angle);
    ctx.drawImage(img, -img.width/2, -img.height/2);
    ctx.restore();

    let link = document.getElementById("download");
    link.href = canvas.toDataURL("image/png");
    link.download = "rotated-image.png";
    link.style.display = "block";
    link.innerText = "Download Rotated Image";
}
</script>

</body>
</html>
