<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Image to Base64 Converter - WebTools</title>
<meta name="description" content="Convert any image to Base64 online for free. Upload an image and instantly get its Base64 encoded string.">
<meta name="keywords" content="Image to Base64, Convert Image to Base64, Online Base64 Converter, Free Image Base64">

<link rel="stylesheet" href="../style.css">

<style>
.tool-container {
    max-width:700px;
    margin:80px auto;
    background:#1e293b;
    padding:30px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    text-align:center;
}

.tool-container h1 {
    margin-bottom:20px;
}

textarea {
    width:100%;
    height:150px;
    margin-top:20px;
    padding:10px;
    border:none;
    border-radius:6px;
    font-family:monospace;
}

button {
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:6px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
}

button:hover {
    background:#2563eb;
}

img {
    margin-top:20px;
    max-width:100%;
    border-radius:6px;
}

.related-tools {
    margin-top:30px;
    text-align:left;
}

.related-tools ul {
    list-style:none;
    padding:0;
}

.related-tools ul li {
    margin-bottom:10px;
}

.related-tools ul li a {
    color:#3b82f6;
    text-decoration:none;
}

.related-tools ul li a:hover {
    text-decoration:underline;
}
</style>

</head>

<body>

<header class="navbar">
<h2 class="logo">WebTools</h2>
<nav>
<a href="../index.html">Home</a>
<a href="../index.html">All Tools</a>
</nav>
</header>

<div class="tool-container">

<h1>🖼 Image to Base64 Converter</h1>

<p>Upload your image and get the Base64 code instantly.</p>

<input type="file" id="upload">

<img id="preview" style="display:none;">

<textarea id="output" placeholder="Base64 code will appear here..." readonly></textarea>

<button onclick="copyBase64()">Copy Base64</button>

<div class="related-tools">
<h2>Related Tools</h2>
<ul>
<li><a href="base64-encoder.html">Base64 Encoder</a></li>
<li><a href="base64-decoder.html">Base64 Decoder</a></li>
<li><a href="base64-to-image.html">Base64 to Image Converter</a></li>
<li><a href="image-compressor.html">Image Compressor</a></li>
</ul>
</div>

</div>

<script>
const upload = document.getElementById("upload");
const preview = document.getElementById("preview");
const output = document.getElementById("output");

upload.addEventListener("change", function(){
    const file = upload.files[0];
    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(e){
        preview.src = e.target.result;
        preview.style.display = "block";
        output.value = e.target.result;
    }

    reader.readAsDataURL(file);
});

function copyBase64(){
    if(!output.value) return alert("No Base64 data to copy!");
    output.select();
    navigator.clipboard.writeText(output.value).then(() => {
        alert("Base64 copied!");
    });
}
</script>

</body>
</html>
