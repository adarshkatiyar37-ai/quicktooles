<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JPG to PNG Converter - WebTools</title>
<meta name="description" content="Convert JPG images to PNG online quickly and easily. Upload your JPG image and download it as PNG.">
<meta name="keywords" content="JPG to PNG, Convert JPG to PNG, Image Converter, Online Image Tool">

<link rel="stylesheet" href="../style.css">

<style>
.tool-container {
    max-width:700px;
    margin:80px auto;
    background:#1e293b;
    padding:30px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    text-align:center;
}

.tool-container h1 {
    margin-bottom:20px;
}

input[type="file"] {
    margin-top:10px;
    padding:10px;
    border-radius:6px;
    border:none;
    width:90%;
}

button {
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:6px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
    font-size:16px;
}

button:hover {
    background:#2563eb;
}

img {
    margin-top:20px;
    max-width:100%;
    border-radius:6px;
}

canvas {
    margin-top:20px;
    max-width:100%;
    border-radius:6px;
}

.related-tools {
    margin-top:30px;
    text-align:left;
}

.related-tools ul {
    list-style:none;
    padding:0;
}

.related-tools ul li {
    margin-bottom:10px;
}

.related-tools ul li a {
    color:#3b82f6;
    text-decoration:none;
}

.related-tools ul li a:hover {
    text-decoration:underline;
}
</style>

</head>

<body>

<header class="navbar">
<h2 class="logo">WebTools</h2>
<nav>
<a href="../index.html">Home</a>
<a href="../index.html">All Tools</a>
</nav>
</header>

<div class="tool-container">

<h1>🖼 JPG to PNG Converter</h1>

<p>Upload a JPG image to convert it into PNG format.</p>

<input type="file" id="upload" accept="image/jpeg">

<img id="preview" alt="Image Preview">

<canvas id="canvas"></canvas>

<br>

<button onclick="convertImage()">Convert to PNG</button>

<br>

<a id="download" style="display:none;color:#3b82f6;">Download PNG</a>

<div class="related-tools">
<h2>Related Tools</h2>
<ul>
<li><a href="image-converter.html">Image Format Converter</a></li>
<li><a href="image-compressor.html">Image Compressor</a></li>
<li><a href="image-resizer.html">Image Resizer</a></li>
<li><a href="image-to-pdf.html">Image to PDF Converter</a></li>
</ul>
</div>

</div>

<script>
let img = new Image();

document.getElementById("upload").addEventListener("change", function(e){
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function(event){
        img.src = event.target.result;
        document.getElementById("preview").src = event.target.result;
    }

    reader.readAsDataURL(file);
});

function convertImage(){
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = img.width;
    canvas.height = img.height;

    ctx.drawImage(img, 0, 0);

    let png = canvas.toDataURL("image/png");

    let link = document.getElementById("download");
    link.href = png;
    link.download = "converted-image.png";
    link.style.display = "block";
    link.innerText = "Download PNG";
}
</script>

</body>
</html>
