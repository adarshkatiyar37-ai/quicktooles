<meta name="description" content="Online JavaScript minifier tool. Paste your JS code to remove comments, whitespace and minify it instantly.">
<meta name="keywords" content="JavaScript Minifier, JS Minify, Online JS Tool, Minify JavaScript, WebTools">

<link rel="stylesheet" href="../style.css">

<style>
.tool-container {
    max-width:700px;
    margin:80px auto;

}

textarea {

    height:160px;
    padding:12px;

    border-radius:6px;
    margin-top:15px;
    font-family:monospace;
    font-size:14px;
}

button {
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:6px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
    font-size:16px;
}

button:hover {
    background:#2563eb;
}

.result {
    margin-top:20px;
    background:#0f172a;
    padding:15px;

    min-height:80px;
    text-align:left;
    font-family:monospace;

<body>

<header class="navbar">
<h2 class="logo">WebTools</h2>
<nav>
<a href="../index.html">Home</a>

</header>

<div class="tool-container">

<h1>🛠 JavaScript Minifier</h1>

<p>Paste your JavaScript code below and click Minify to remove comments and extra spaces.</p>

<textarea id="jsInput" placeholder="Paste your JavaScript here..."></textarea>

<br>

<button onclick="minifyJS()">Minify JS</button>

<div class="result" id="result"></div>

<div class="related-tools">
<h2>Related Tools</h2>
<ul>
<li><a href="css-minifier.html">CSS Minifier</a></li>
<li><a href="html-minifier.html">HTML Minifier</a></li>

<li><a href="case-converter.html">Case Converter</a></li>
</ul>
</div>

</div>

<script>
function minifyJS(){
    let js=document.getElementById("jsInput").value;

    // Remove single-line comments
    js = js.replace(/\/\/.*$/gm, '');
    // Remove multi-line comments
    js = js.replace(/\/\*[\s\S]*?\*\//g,'');
    // Remove new lines and extra spaces
    js = js.replace(/\n/g,'');
    js = js.replace(/\s{2,}/g,' ');
    js = js.trim();

    document.getElementById("result").innerText = js;
}
</script>

</body>
