<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lorem Ipsum Generator</title>

<style>

body{
font-family:Arial, sans-serif;
background:#0f172a;
color:white;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:#1e293b;
padding:30px;
border-radius:10px;
width:600px;
text-align:center;
}

input{
padding:10px;
border:none;
border-radius:6px;
width:80px;
margin-top:10px;
}

button{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:6px;
background:#3b82f6;
color:white;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

.result{
margin-top:20px;
background:#0f172a;
padding:15px;
border-radius:6px;
text-align:left;
}

</style>

</head>

<body>

<div class="container">

<h2>Lorem Ipsum Generator</h2>

<label>Number of Paragraphs:</label>

<br>

<input type="number" id="count" value="1" min="1" max="20">

<br>

<button onclick="generateLorem()">Generate</button>

<div class="result" id="result"></div>

</div>

<script>

const lorem = "Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam.";

function generateLorem(){

let count=document.getElementById("count").value;

let output="";

for(let i=0;i<count;i++){
output += "<p>"+lorem+"</p>";
}

document.getElementById("result").innerHTML=output;

}

</script>

</body>
</html>
