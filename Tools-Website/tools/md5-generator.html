<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MD5 Hash Generator - WebTools</title>
<meta name="description" content="Online MD5 Hash Generator. Enter text to quickly generate its MD5 hash instantly.">
<meta name="keywords" content="MD5 Generator, MD5 Hash Online, Hash Generator, WebTools">

<link rel="stylesheet" href="../style.css">

<style>
.tool-container {
    max-width:600px;
    margin:80px auto;
    background:#1e293b;
    padding:30px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    text-align:center;
}

.tool-container h1 {
    margin-bottom:20px;
}

input {
    width:100%;
    padding:12px;
    border:none;
    border-radius:6px;
    margin-top:15px;
    font-size:14px;
}

button {
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:6px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
    font-size:16px;
}

button:hover {
    background:#2563eb;
}

.result {
    margin-top:20px;
    background:#0f172a;
    padding:15px;
    border-radius:6px;
    word-break:break-all;
    font-family:monospace;
}

.related-tools {
    margin-top:30px;
    text-align:left;
}

.related-tools ul {
    list-style:none;
    padding:0;
}

.related-tools ul li {
    margin-bottom:10px;
}

.related-tools ul li a {
    color:#3b82f6;
    text-decoration:none;
}

.related-tools ul li a:hover {
    text-decoration:underline;
}
</style>

</head>

<body>

<header class="navbar">
<h2 class="logo">WebTools</h2>
<nav>
<a href="../index.html">Home</a>
<a href="../index.html">All Tools</a>
</nav>
</header>

<div class="tool-container">

<h1>🔐 MD5 Hash Generator</h1>

<p>Enter your text below to generate its MD5 hash.</p>

<input type="text" id="inputText" placeholder="Enter text to generate MD5 hash">

<br>

<button onclick="generateMD5()">Generate MD5</button>

<div class="result" id="result"></div>

<div class="related-tools">
<h2>Related Tools</h2>
<ul>
<li><a href="sha1-generator.html">SHA1 Hash Generator</a></li>
<li><a href="sha256-generator.html">SHA256 Hash Generator</a></li>
<li><a href="hash-encoder.html">Hash Encoder/Decoder</a></li>
<li><a href="base64-converter.html">Base64 Converter</a></li>
</ul>
</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/blueimp-md5/2.19.0/js/md5.min.js"></script>

<script>
function generateMD5(){
    let text=document.getElementById("inputText").value;
    if(!text){
        document.getElementById("result").innerText="Please enter some text!";
        return;
    }
    let hash=md5(text);
    document.getElementById("result").innerText=hash;
}
</script>

</body>
</html>
