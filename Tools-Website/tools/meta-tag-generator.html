<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meta Tag Generator - WebTools</title>
<meta name="description" content="Online Meta Tag Generator. Quickly generate SEO meta tags for your website.">
<meta name="keywords" content="Meta Tag Generator, SEO Meta Tags, HTML Meta, WebTools">

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.tool-container {
    max-width: 600px;
    margin: 80px auto;
    background: #1e293b;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    text-align: center;
}

.tool-container h1 {
    margin-bottom: 20px;
}

input, textarea {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 6px;
    margin-top: 10px;
    font-size: 14px;
}

button {
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    border-radius: 6px;
    background: #3b82f6;
    color: white;
    cursor: pointer;
    font-size: 16px;
}

button:hover {
    background: #2563eb;
}

.result {
    margin-top: 20px;
    background: #0f172a;
    padding: 15px;
    border-radius: 6px;
    text-align: left;
    white-space: pre-wrap;
    font-family: monospace;
}

.related-tools {
    margin-top: 30px;
    text-align: left;
}

.related-tools ul {
    list-style: none;
    padding: 0;
}

.related-tools ul li {
    margin-bottom: 10px;
}

.related-tools ul li a {
    color: #3b82f6;
    text-decoration: none;
}

.related-tools ul li a:hover {
    text-decoration: underline;
}
</style>
</head>

<body>

<div class="tool-container">

<h1>📝 Meta Tag Generator</h1>

<input type="text" id="title" placeholder="Website Title">

<textarea id="description" placeholder="Meta Description"></textarea>

<input type="text" id="keywords" placeholder="Keywords (comma separated)">

<input type="text" id="author" placeholder="Author Name">

<button onclick="generateMeta()">Generate Meta Tags</button>

<div class="result" id="result"></div>

<div class="related-tools">
<h2>Related Tools</h2>
<ul>
    <li><a href="meta-validator.html">Meta Tag Validator</a></li>
    <li><a href="seo-analyzer.html">SEO Analyzer</a></li>
    <li><a href="html-minifier.html">HTML Minifier</a></li>
    <li><a href="json-formatter.html">JSON Formatter</a></li>
</ul>
</div>

</div>

<script>
function generateMeta() {
    let title = document.getElementById("title").value.trim();
    let desc = document.getElementById("description").value.trim();
    let keywords = document.getElementById("keywords").value.trim();
    let author = document.getElementById("author").value.trim();

    if(!title && !desc && !keywords && !author){
        document.getElementById("result").innerText = "Please enter at least one field!";
        return;
    }

    let metaTags = 
`<title>${title}</title>
<meta name="description" content="${desc}">
<meta name="keywords" content="${keywords}">
<meta name="author" content="${author}">
<meta name="viewport" content="width=device-width, initial-scale=1.0">`;

    document.getElementById("result").innerText = metaTags;
}
</script>

</body>
</html>
