<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Password Strength Checker - WebTools</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Check your password strength online. Password Strength Checker rates your password as Weak, Medium, or Strong.">
<meta name="keywords" content="Password Strength Checker, WebTools, Online Password Check, Security">
<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}
.tool-container {
    max-width: 400px;
    margin: 50px auto;
    background: #1e293b;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    text-align: center;
}
.tool-container h1 {
    margin-bottom: 20px;
}
input[type="password"] {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 6px;
    margin-top: 15px;
    font-size: 14px;
}
.result {
    margin-top: 20px;
    padding: 12px;
    border-radius: 6px;
    font-weight: bold;
    color: white;
}
.weak {
    background: #ef4444;
}
.medium {
    background: #f59e0b;
}
.strong {
    background: #22c55e;
}
.related-tools {
    margin-top: 30px;
    text-align: left;
}
.related-tools ul {
    list-style: none;
    padding: 0;
}
.related-tools ul li {
    margin-bottom: 10px;
}
.related-tools ul li a {
    color: #3b82f6;
    text-decoration: none;
}
.related-tools ul li a:hover {
    text-decoration: underline;
}
</style>
</head>
<body>

<div class="tool-container">

<h1>🔒 Password Strength Checker</h1>

<input type="password" id="password" placeholder="Enter your password" onkeyup="checkPassword()">

<div id="result" class="result">Password strength will appear here</div>

<div class="related-tools">
<h2>Related Tools</h2>
<ul>
    <li><a href="md5-generator.html">MD5 Hash Generator</a></li>
    <li><a href="base64-encoder.html">Base64 Encoder</a></li>
    <li><a href="random-password.html">Random Password Generator</a></li>
</ul>
</div>

</div>

<script>
function checkPassword(){
    let pass = document.getElementById("password").value;
    let strength = 0;

    if(pass.length >= 8) strength++;
    if(/[A-Z]/.test(pass)) strength++;
    if(/[0-9]/.test(pass)) strength++;
    if(/[!@#$%^&*]/.test(pass)) strength++;

    let result = document.getElementById("result");

    if(strength <= 1){
        result.innerText = "Weak Password";
        result.className = "result weak";
    }
    else if(strength == 2 || strength == 3){
        result.innerText = "Medium Password";
        result.className = "result medium";
    }
    else{
        result.innerText = "Strong Password";
        result.className = "result strong";
    }
}
</script>

</body>
</html>
