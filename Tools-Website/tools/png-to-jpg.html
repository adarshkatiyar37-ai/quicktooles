<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PNG to JPG Converter - WebTools</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Convert PNG images to JPG online easily with this PNG to JPG Converter tool.">
<meta name="keywords" content="PNG to JPG, Image Converter, Online Tools">
<style>
body{
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
}
.container{
    background: #1e293b;
    padding: 30px;
    border-radius: 12px;
    width: 500px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}
h2{
    margin-bottom: 20px;
}
input[type="file"]{
    margin-top: 15px;
    padding: 10px;
    border-radius: 6px;
    border: none;
    width: 80%;
}
button{
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    border-radius: 6px;
    background: #3b82f6;
    color: white;
    cursor: pointer;
    font-size: 16px;
}
button:hover{
    background: #2563eb;
}
img{
    margin-top: 20px;
    max-width: 100%;
    border-radius: 6px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.5);
}
#download{
    display: none;
    margin-top: 15px;
    color: #3b82f6;
    font-weight: bold;
    text-decoration: none;
}
</style>
</head>
<body>

<div class="container">
<h2>🖼️ PNG to JPG Converter</h2>

<input type="file" id="upload" accept="image/png">

<br>

<img id="preview" alt="Image Preview">

<br>

<button onclick="convertImage()">Convert to JPG</button>

<br>

<a id="download">Download JPG</a>

<canvas id="canvas" style="display:none;"></canvas>

<div class="related-tools" style="margin-top:20px; text-align:left;">
<h3>Related Tools</h3>
<ul style="list-style:none; padding-left:0;">
    <li><a href="image-compressor.html" style="color:#3b82f6; text-decoration:none;">Image Compressor</a></li>
    <li><a href="image-converter.html" style="color:#3b82f6; text-decoration:none;">Image Converter</a></li>
    <li><a href="jpg-to-png.html" style="color:#3b82f6; text-decoration:none;">JPG to PNG Converter</a></li>
</ul>
</div>
</div>

<script>
let img = new Image();

document.getElementById("upload").addEventListener("change", function(e){
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = function(event){
        img.src = event.target.result;
        document.getElementById("preview").src = event.target.result;
    }
    reader.readAsDataURL(file);
});

function convertImage(){
    if(!img.src){
        alert("Please select a PNG image first!");
        return;
    }

    let canvas = document.getElementById("canvas");
    let ctx = canvas.getContext("2d");

    canvas.width = img.width;
    canvas.height = img.height;

    ctx.drawImage(img,0,0);

    let jpg = canvas.toDataURL("image/jpeg", 0.9);

    let link = document.getElementById("download");
    link.href = jpg;
    link.download = "converted-image.jpg";
    link.style.display = "block";
    link.innerText = "Download JPG";
}
</script>

</body>
</html>
