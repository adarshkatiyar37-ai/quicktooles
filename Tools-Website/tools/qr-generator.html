<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QR Code Generator - WebTools</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Generate QR Codes online instantly. Convert text or URL into QR code image.">
<meta name="keywords" content="QR Code Generator, QR code online, URL to QR, text to QR">
<style>
body{
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
}
.container{
    background: #1e293b;
    padding: 30px;
    border-radius: 12px;
    width: 420px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}
h2{
    margin-bottom: 20px;
}
input[type="text"]{
    width: 100%;
    padding: 12px;
    border-radius: 6px;
    border: none;
    margin-bottom: 15px;
}
button{
    padding: 10px 20px;
    border: none;
    border-radius: 6px;
    background: #3b82f6;
    color: white;
    cursor: pointer;
    font-size: 16px;
}
button:hover{
    background: #2563eb;
}
.qr-box{
    margin-top: 20px;
    background: #0f172a;
    padding: 15px;
    border-radius: 8px;
    display: inline-block;
}
img{
    margin-top: 10px;
    max-width: 100%;
    border-radius: 6px;
}
.related-tools{
    margin-top: 25px;
    text-align: left;
}
.related-tools h3{
    margin-bottom: 8px;
}
.related-tools ul{
    list-style: none;
    padding-left: 0;
}
.related-tools ul li a{
    color: #3b82f6;
    text-decoration: none;
}
.related-tools ul li a:hover{
    text-decoration: underline;
}
</style>
</head>
<body>

<div class="container">
<h2>🔳 QR Code Generator</h2>

<input type="text" id="text" placeholder="Enter text or URL">

<button onclick="generateQR()">Generate QR Code</button>

<div class="qr-box">
<img id="qrImage" src="" alt="QR Code">
</div>

<div class="related-tools">
<h3>Related Tools</h3>
<ul>
    <li><a href="image-converter.html">Image Converter</a></li>
    <li><a href="png-to-jpg.html">PNG to JPG Converter</a></li>
    <li><a href="jpg-to-png.html">JPG to PNG Converter</a></li>
    <li><a href="image-compressor.html">Image Compressor</a></li>
</ul>
</div>
</div>

<script>
function generateQR(){
    let text = document.getElementById("text").value.trim();
    if(!text){
        alert("Please enter some text or URL!");
        return;
    }
    let qrURL = "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" + encodeURIComponent(text);
    document.getElementById("qrImage").src = qrURL;
}
</script>

</body>
</html>
