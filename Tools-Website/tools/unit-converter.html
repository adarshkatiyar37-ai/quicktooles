<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Unit Converter - WebTools</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Convert units of Length, Weight, Temperature, and Volume easily using this online Unit Converter tool.">
<meta name="keywords" content="Unit Converter, Length Converter, Weight Converter, Temperature Converter, Volume Converter, Online Tools, WebTools">
<style>
body{
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}
.container{
    background: #1e293b;
    padding: 30px;
    border-radius: 12px;
    width: 500px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}
h2{
    margin-bottom: 20px;
}
input, select{
    width: 80%;
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 6px;
    text-align: center;
    font-size: 16px;
}
button{
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    border-radius: 6px;
    background: #3b82f6;
    color: white;
    cursor: pointer;
    font-size: 16px;
}
button:hover{
    background: #2563eb;
}
.result{
    margin-top: 20px;
    background: #0f172a;
    padding: 15px;
    border-radius: 6px;
    text-align: center;
    font-weight: bold;
    font-size: 16px;
}
.related-tools{
    margin-top: 25px;
    text-align: left;
}
.related-tools h3{
    margin-bottom: 8px;
}
.related-tools ul{
    list-style: none;
    padding-left: 0;
}
.related-tools ul li a{
    color: #3b82f6;
    text-decoration: none;
}
.related-tools ul li a:hover{
    text-decoration: underline;
}
</style>
</head>

<body>

<div class="container">

<h2>🔄 Unit Converter</h2>

<input type="number" id="value" placeholder="Enter value">

<br>

<select id="category">
<option value="length">Length</option>
<option value="weight">Weight</option>
<option value="temperature">Temperature</option>
<option value="volume">Volume</option>
</select>

<br>

<select id="unitFrom"></select>
<select id="unitTo"></select>

<br>

<button onclick="convertUnit()">Convert</button>

<div class="result" id="result">Result will appear here</div>

<div class="related-tools">
<h3>Related Tools</h3>
<ul>
    <li><a href="time-converter.html">Time Converter</a></li>
    <li><a href="number-base-converter.html">Number Base Converter</a></li>
</ul>
</div>

</div>

<script>
const units = {
    length: { meter:1, kilometer:1000, centimeter:0.01, millimeter:0.001, mile:1609.34, yard:0.9144, foot:0.3048, inch:0.0254 },
    weight: { gram:1, kilogram:1000, milligram:0.001, pound:453.592, ounce:28.3495 },
    temperature: { celsius:'c', fahrenheit:'f', kelvin:'k' },
    volume: { liter:1, milliliter:0.001, gallon:3.78541, pint:0.473176 }
};

const categorySelect = document.getElementById("category");
const unitFrom = document.getElementById("unitFrom");
const unitTo = document.getElementById("unitTo");

function populateUnits(){
    let cat = categorySelect.value;
    unitFrom.innerHTML = '';
    unitTo.innerHTML = '';
    for(let u in units[cat]){
        let optionFrom = document.createElement('option');
        optionFrom.value = u;
        optionFrom.innerText = u;
        unitFrom.appendChild(optionFrom);

        let optionTo = document.createElement('option');
        optionTo.value = u;
        optionTo.innerText = u;
        unitTo.appendChild(optionTo);
    }
}

categorySelect.addEventListener('change', populateUnits);
window.onload = populateUnits;

function convertUnit(){
    let cat = categorySelect.value;
    let from = unitFrom.value;
    let to = unitTo.value;
    let val = parseFloat(document.getElementById("value").value);

    if(isNaN(val)){
        alert("Enter valid number");
        return;
    }

    let result;

    if(cat==='temperature'){
        if(from==='celsius'){
            if(to==='fahrenheit') result = val*9/5+32;
            else if(to==='kelvin') result = val+273.15;
            else result = val;
        } else if(from==='fahrenheit'){
            if(to==='celsius') result = (val-32)*5/9;
            else if(to==='kelvin') result = (val-32)*5/9+273.15;
            else result = val;
        } else if(from==='kelvin'){
            if(to==='celsius') result = val-273.15;
            else if(to==='fahrenheit') result = (val-273.15)*9/5+32;
            else result = val;
        }
    } else {
        result = val * units[cat][from] / units[cat][to];
    }

    document.getElementById("result").innerText = `${val} ${from} = ${result} ${to}`;
}
</script>

</body>
</html>
