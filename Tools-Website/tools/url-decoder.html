<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>URL Decoder</title>

<style>
body{
font-family:Arial, sans-serif;
background:#0f172a;
color:white;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:#1e293b;
padding:30px;
border-radius:10px;
width:500px;
text-align:center;
}

textarea{
width:90%;
padding:12px;
border:none;
border-radius:6px;
margin-top:10px;
resize:none;
}

button{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:6px;
background:#3b82f6;
color:white;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#2563eb;
}

.result{
margin-top:20px;
background:#0f172a;
padding:15px;
border-radius:6px;
text-align:left;
word-break:break-word;
}
</style>
</head>

<body>

<div class="container">

<h2>URL Decoder</h2>

<textarea id="urlInput" rows="5" placeholder="Enter encoded URL here"></textarea>

<br>

<button onclick="decodeURL()">Decode URL</button>

<div class="result" id="result">Decoded URL will appear here</div>

</div>

<script>
function decodeURL(){
let input=document.getElementById("urlInput").value;
try{
let decoded=decodeURIComponent(input);
document.getElementById("result").innerText=decoded;
}catch(e){
document.getElementById("result").innerText="Invalid URL encoding!";
}
}
</script>

</body>
</html>
