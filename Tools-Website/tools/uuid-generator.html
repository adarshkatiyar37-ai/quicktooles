<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UUID Generator - WebTools</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Generate UUIDs quickly and easily with this online UUID Generator tool.">
<meta name="keywords" content="UUID Generator, Online UUID, Random UUID, WebTools">
<style>
body{
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}
.container{
    background: #1e293b;
    padding: 30px;
    border-radius: 12px;
    width: 500px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}
h2{
    margin-bottom: 20px;
}
button{
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    border-radius: 6px;
    background: #3b82f6;
    color: white;
    cursor: pointer;
    font-size: 16px;
}
button:hover{
    background: #2563eb;
}
.result{
    margin-top: 20px;
    background: #0f172a;
    padding: 15px;
    border-radius: 6px;
    text-align: center;
    word-break: break-word;
    font-size: 16px;
}
.related-tools{
    margin-top: 25px;
    text-align: left;
}
.related-tools h3{
    margin-bottom: 8px;
}
.related-tools ul{
    list-style: none;
    padding-left: 0;
}
.related-tools ul li a{
    color: #3b82f6;
    text-decoration: none;
}
.related-tools ul li a:hover{
    text-decoration: underline;
}
</style>
</head>
<body>

<div class="container">

<h2>🆔 UUID Generator</h2>

<button onclick="generateUUID()">Generate UUID</button>

<div class="result" id="result">Your UUID will appear here</div>

<div class="related-tools">
<h3>Related Tools</h3>
<ul>
    <li><a href="random-number-generator.html">Random Number Generator</a></li>
    <li><a href="random-text-generator.html">Random Text Generator</a></li>
    <li><a href="sha-generator.html">SHA Generator</a></li>
</ul>
</div>

</div>

<script>
function generateUUID() {
    let uuid = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
        let r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
        return v.toString(16);
    });
    document.getElementById("result").innerText = uuid;
}
</script>

</body>
</html>
