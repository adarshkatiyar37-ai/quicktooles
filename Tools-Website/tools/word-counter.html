<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Counter - Quicktooles</title>
<link rel="stylesheet" href="../style.css">
<style>
.container{
max-width:700px;
margin:50px auto;
background:#1e293b;
padding:30px;
border-radius:10px;
color:white;
}
textarea{
width:100%;
height:200px;
padding:12px;
border-radius:6px;
border:none;
margin-bottom:15px;
}
button{
padding:12px 20px;
background:#3b82f6;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}
button:hover{
background:#2563eb;
}
.result{
margin-top:20px;
font-size:18px;
background:#0f172a;
padding:15px;
border-radius:6px;
}
.back-home{
margin-top:20px;
display:block;
color:#3b82f6;
text-decoration:none;
}
</style>
</head>
<body>
<div class="container">
<h1>📝 Word Counter</h1>
<p>The Word Counter tool counts the number of words and characters in your text. It's useful for writers, students, and developers who want to analyze text quickly.</p>

<textarea id="text" placeholder="Paste your text here..."></textarea>
<button onclick="countWords()">Count Words</button>

<div class="result" id="result">Result will appear here</div>

<a href="../index.html" class="back-home">⬅ Back to Home</a>
</div>

<script>
function countWords(){
  let text = document.getElementById("text").value;
  let words = text.trim().split(/\s+/).filter(Boolean).length;
  let characters = text.length;
  document.getElementById("result").innerText = `Words: ${words} | Characters: ${characters}`;
}
</script>
</body>
</html>
