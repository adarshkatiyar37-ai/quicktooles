<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Word to PDF</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/docx/7.1.0/docx.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
body{
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}
.container{
background:#1e293b;
padding:30px;
border-radius:10px;
width:500px;
text-align:center;
}
textarea{
width:90%;
padding:12px;
border:none;
border-radius:6px;
margin-top:10px;
resize:none;
}
button{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:6px;
background:#3b82f6;
color:white;
cursor:pointer;
font-size:16px;
}
button:hover{
background:#2563eb;
}
</style>
</head>
<body>
<div class="container">
<h2>Word to PDF</h2>
<textarea id="text" rows="10" placeholder="Paste your Word content here"></textarea>
<br>
<button onclick="convertWordToPDF()">Convert to PDF</button>

</div>

<script>
function convertWordToPDF(){
let content=document.getElementById("text").value;
if(!content){alert("Enter text first!"); return;}
let element=document.createElement('div');
element.innerText=content;
html2pdf().from(element).save('document.pdf');
}
</script>
</body>
</html>
