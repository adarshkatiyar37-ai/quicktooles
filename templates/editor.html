<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive PDF Workspace</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #2563eb;
            --hover-blue: #1d4ed8;
            --danger-red: #ef4444;
            --hover-red: #dc2626;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --bg-body: #ffffff;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg-body); 
            margin: 0; 
            padding: 20px; 
            color: var(--text-dark);
        }

        /* Top Action Header */
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: #ffffff; 
            padding: 16px 24px; 
            border-radius: 14px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            margin-bottom: 25px; 
            border: 1px solid var(--border-color);
        }

        .header-info h2 { 
            font-size: 1.2rem; 
            font-weight: 800; 
            color: var(--text-dark); 
            margin: 0 0 2px 0; 
        }

        .header-info p {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin: 0;
            font-weight: 500;
        }

        /* Page Card Grid */
        .grid { 
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px; 
            justify-content: center; 
        }

        .page-card { 
            background: #ffffff; 
            padding: 14px; 
            border-radius: 14px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.03); 
            text-align: center; 
            border: 1px solid var(--border-color);
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .page-card:hover {
            transform: translateY(-3px);
            border-color: var(--primary-blue);
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.05);
        }

        .page-num {
            margin: 0 0 10px 0; 
            font-weight: 700; 
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .img-container {
            width: 100%;
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8fafc;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #f1f5f9;
            margin-bottom: 12px;
        }

        .page-card img { 
            max-width: 90%; 
            max-height: 90%; 
            object-fit: contain; 
            transition: transform 0.2s ease;
        }

        /* Action Buttons inside cards */
        .btn-action-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        .btn-action { 
            padding: 8px 6px; 
            font-size: 0.75rem; 
            font-weight: 700; 
            cursor: pointer; 
            border: none; 
            border-radius: 8px; 
            color: white; 
            transition: all 0.2s ease;
        }

        .btn-rotate { 
            background: var(--primary-blue); 
        }

        .btn-rotate:hover { 
            background: var(--hover-blue); 
        }

        .btn-delete { 
            background: var(--danger-red); 
        }

        .btn-delete:hover { 
            background: var(--hover-red); 
        }

        .btn-download { 
            background: #10b981; 
            padding: 12px 20px; 
            font-size: 0.85rem; 
            font-weight: 700; 
            text-decoration: none; 
            color: white; 
            border-radius: 10px; 
            transition: all 0.2s ease;
        }

        .btn-download:hover {
            background: #059669;
        }

        @media (max-width: 600px) {
            .header {
                flex-direction: column;
                gap: 12px;
                text-align: center;
            }
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
                gap: 12px;
            }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-info">
        <h2>Manual Page Studio</h2>
        <p>Rotate or delete pages individually below</p>
    </div>
    <a href="/download" class="btn-download">Download PDF ⬇</a>
</div>

<div class="grid">
    {% for page in pages %}
    <div class="page-card" id="card-{{ page.index }}">
        <p class="page-num">Page {{ page.display_num }}</p>
        <div class="img-container">
            <img src="/static/thumbnails/{{ page.image }}" id="img-{{ page.index }}" style="transform: rotate({{ page.rotation }}deg);">
        </div>
        <div class="btn-action-group">
            <button class="btn-action btn-rotate" onclick="rotatePage({{ page.index }})">Rotate 🔄</button>
            <button class="btn-action btn-delete" onclick="deletePage({{ page.index }})">Delete 🗑</button>
        </div>
    </div>
    {% endfor %}
</div>

<script>
function deletePage(index) {
    if(confirm("Are you sure you want to delete Page " + (index + 1) + "?")) {
        fetch('/delete_page', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({index: index})
        }).then(res => res.json()).then(data => {
            if(data.status === 'success') {
                document.getElementById('card-' + index).style.display = 'none';
            }
        });
    }
}

function rotatePage(index) {
    fetch('/rotate_page', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({index: index})
    }).then(res => res.json()).then(data => {
        if(data.status === 'success') {
            const img = document.getElementById('img-' + index);
            let currentRotation = img.style.transform.replace(/[^0-9]/g, '');
            currentRotation = currentRotation ? parseInt(currentRotation) : 0;
            let newRotation = (currentRotation + 90) % 360;
            img.style.transform = `rotate(${newRotation}deg)`;
        }
    });
}
</script>
</body>
</html>
