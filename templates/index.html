<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart PDF Tool</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', Arial, sans-serif; 
            background: #ffffff; 
            display: flex; 
            justify-content: center; 
            padding-top: 40px; 
            margin: 0;
            color: #0f172a;
        }
        .container { 
            background: white; 
            padding: 30px 20px; 
            border-radius: 16px; 
            width: 100%;
            max-width: 400px; 
            text-align: center; 
            box-sizing: border-box;
        }
        .container h2 {
            font-size: 1.6rem;
            font-weight: 800;
            margin: 0 0 8px 0;
            letter-spacing: -0.5px;
        }
        .container p {
            font-size: 0.9rem;
            color: #64748b;
            margin-bottom: 25px;
            font-weight: 500;
        }
        .upload-box { 
            border: 2px dashed #cbd5e1; 
            padding: 40px 20px; 
            cursor: pointer; 
            margin-bottom: 24px; 
            background: #f8fafc; 
            border-radius: 14px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            transition: all 0.2s ease;
        }
        .upload-box:hover {
            border-color: #2563eb;
            background: #eff6ff;
        }
        .upload-icon {
            font-size: 2rem;
        }
        #label {
            color: #0f172a;
            font-weight: 700;
            font-size: 0.9rem;
        }
        .upload-sublabel {
            font-size: 0.75rem;
            color: #64748b;
            font-weight: 500;
        }
        .btn-group { display: flex; gap: 12px; }
        .btn { 
            color: white; 
            padding: 12px 18px; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            flex: 1; 
            font-size: 0.9rem; 
            font-weight: 700; 
            transition: all 0.2s ease; 
        }
        .btn-auto { background: #2563eb; }
        .btn-auto:hover { background: #1d4ed8; }
        .btn-manual { background: #ffffff; color: #0f172a; border: 1px solid #cbd5e1; }
        .btn-manual:hover { background: #f8fafc; }
        .btn-download { background: #10b981; width: 100%; font-size: 0.95rem; padding: 12px; }
        .btn-download:hover { background: #059669; }
        .stats { 
            background: #f0fdf4; 
            padding: 20px; 
            border-radius: 12px; 
            text-align: left; 
            margin-bottom: 20px; 
            border: 1px solid #bbf7d0; 
        }
        .stats strong { 
            color: #166534; 
            font-size: 1rem; 
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
        }
        .stats p { 
            margin: 4px 0; 
            color: #1e293b; 
            font-size: 0.85rem; 
            font-weight: 600;
        }
        .reset-link {
            display: inline-block;
            color: #2563eb; 
            text-decoration: none; 
            font-size: 0.85rem; 
            font-weight: 700;
        }
        .reset-link:hover {
            color: #1d4ed8;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>PDF Cleaner</h2>
    <p>Choose your PDF file and select an optimization mode below:</p>
    
    {% if not download %}
    <form action="/" method="POST" enctype="multipart/form-data" id="pdfForm">
        <div class="upload-box" onclick="document.getElementById('pdf_file').click()">
            <div class="upload-icon">📥</div>
            <span id="label">Choose PDF Document</span>
            <span class="upload-sublabel" id="sublabel">Click to browse your directory</span>
            <input type="file" name="pdf_file" id="pdf_file" accept=".pdf" required onchange="document.getElementById('label').innerText=this.files[0].name; document.getElementById('sublabel').innerText='File selected';" style="display: none;">
        </div>
        
        <input type="hidden" name="mode" id="selectedMode" value="auto">
        
        <div class="btn-group">
            <button type="submit" class="btn btn-auto" onclick="document.getElementById('selectedMode').value='auto'">Automated Run</button>
            <button type="submit" class="btn btn-manual" onclick="document.getElementById('selectedMode').value='manual'">Manual Studio</button>
        </div>
    </form>
    {% else %}
    <div class="stats">
        <strong>Optimization Complete!</strong>
        <p>• Blank Pages Omitted: {{ blanks }}</p>
        <p>• Rotated Pages Fixed: {{ rotated }}</p>
    </div>
    <a href="/download"><button class="btn btn-download">Download Processed PDF</button></a>
    <br><br>
    <a href="/" class="reset-link">Upload Another File</a>
    {% endif %}
</div>
</body>
</html>
