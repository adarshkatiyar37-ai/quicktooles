<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Base64 Decoder Online - Free Tool | WebTools</title>
<meta name="description" content="Decode Base64 encoded text online for free. Easy-to-use Base64 Decoder tool for developers, students, and creators.">
<meta name="keywords" content="base64 decoder, decode base64 online, free base64 tool, online base64 decoder">
<meta name="robots" content="index, follow">

<link rel="stylesheet" href="../style.css">

<style>
.tool-container{
    max-width:800px;
    margin:80px auto;
    background:#1e293b;
    padding:30px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.tool-container h1{
    text-align:center;
    margin-bottom:20px;
}

textarea{
    width:100%;
    height:150px;
    padding:12px;
    border:none;
    border-radius:6px;
    margin-bottom:15px;
    font-size:15px;
}

button{
    padding:12px 20px;
    background:#3b82f6;
    border:none;
    color:white;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
    margin-right:10px;
}

button:hover{
    background:#2563eb;
}

.result{
    margin-top:20px;
    background:#0f172a;
    padding:15px;
    border-radius:6px;
    min-height:60px;
    word-wrap:break-word;
}

.related-tools{
    margin-top:40px;
    text-align:left;
}

.related-tools ul{
    list-style:none;
    padding:0;
}

.related-tools ul li{
    margin-bottom:10px;
}

.related-tools ul li a{
    color:#3b82f6;
    text-decoration:none;
}

.related-tools ul li a:hover{
    text-decoration:underline;
}
</style>
</head>

<body>

<header class="navbar">
    <h2 class="logo">WebTools</h2>
    <nav>
        <a href="../index.html">Home</a>
        <a href="../index.html">All Tools</a>
    </nav>
</header>

<div class="tool-container">

<h1>📦 Base64 Decoder</h1>

<p>Paste your Base64 encoded text below</p>

<textarea id="base64Input" placeholder="Enter Base64 text..."></textarea>

<button onclick="decodeBase64()">Decode</button>
<button onclick="clearText()">Clear</button>

<div class="result" id="result"></div>

<div class="related-tools">
    <h2>Related Tools</h2>
    <ul>
        <li><a href="base64-encoder.html">Base64 Encoder</a></li>
        <li><a href="ascii-to-text.html">ASCII to Text Converter</a></li>
        <li><a href="text-to-ascii.html">Text to ASCII Converter</a></li>
    </ul>
</div>

</div>

<script>
function decodeBase64(){
    let input=document.getElementById("base64Input").value;
    try{
        let decoded=atob(input);
        document.getElementById("result").innerText=decoded;
    }catch{
        document.getElementById("result").innerText="Invalid Base64 string";
    }
}

function clearText(){
    document.getElementById("base64Input").value="";
    document.getElementById("result").innerText="";
}
</script>

</body>
</html>
