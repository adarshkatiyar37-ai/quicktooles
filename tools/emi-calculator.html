<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EMI Calculator - WebTools</title>
<meta name="description" content="Calculate your monthly EMI easily using this free online EMI Calculator. Enter loan amount, interest rate, and tenure.">
<meta name="keywords" content="EMI calculator, loan EMI, monthly payment calculator, webtools">
<meta name="robots" content="index, follow">

<link rel="stylesheet" href="../style.css">

<style>
.tool-container {
    max-width:500px;
    margin:80px auto;
    background:#1e293b;
    padding:30px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    text-align:center;
}

.tool-container h1 {
    text-align:center;
    margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:6px;
font-size:16px;
}

button{
margin-top:15px;
padding:12px;
width:100%;
border:none;
border-radius:6px;
background:#3b82f6;
color:white;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#2563eb;
}

.result{
margin-top:20px;
background:#0f172a;
padding:15px;
border-radius:6px;
min-height:50px;
text-align:left;
font-size:16px;
}

.related-tools{
margin-top:30px;
text-align:left;
}

.related-tools ul{
list-style:none;
padding:0;
}

.related-tools ul li{
margin-bottom:10px;
}

.related-tools ul li a{
color:#3b82f6;
text-decoration:none;
}

.related-tools ul li a:hover{
text-decoration:underline;
}
</style>

</head>

<body>

<header class="navbar">
<h2 class="logo">WebTools</h2>
<nav>
<a href="../index.html">Home</a>
<a href="../index.html">All Tools</a>
</nav>
</header>

<div class="tool-container">

<h1>💰 EMI Calculator</h1>

<p>Enter loan details to calculate your monthly EMI</p>

<input type="number" id="loan" placeholder="Loan Amount">
<input type="number" id="rate" placeholder="Interest Rate (%)">
<input type="number" id="time" placeholder="Loan Tenure (Months)">

<button onclick="calculateEMI()">Calculate EMI</button>

<div class="result" id="result"></div>

<div class="related-tools">
<h2>Related Tools</h2>
<ul>
<li><a href="percentage-calculator.html">Percentage Calculator</a></li>
<li><a href="age-calculator.html">Age Calculator</a></li>
</ul>
</div>

</div>

<script>
function calculateEMI(){
    let P=document.getElementById("loan").value;
    let R=document.getElementById("rate").value/12/100;
    let N=document.getElementById("time").value;

    if(!P || !R || !N){
        document.getElementById("result").innerHTML="Please enter valid values";
        return;
    }

    let EMI=(P*R*Math.pow(1+R,N))/(Math.pow(1+R,N)-1);

    document.getElementById("result").innerHTML=
    "<b>Monthly EMI:</b> "+EMI.toFixed(2);
}
</script>

</body>
</html>
