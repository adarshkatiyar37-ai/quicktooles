<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Image Cropper - WebTools</title>
<meta name="description" content="Crop images online easily with our free Image Cropper tool. Select a portion of your image and download cropped version.">
<meta name="keywords" content="Image Cropper, Crop Image Online, Free Image Crop, PNG Cropper, JPG Cropper">
<meta name="robots" content="index, follow">

<link rel="stylesheet" href="../style.css">

<style>
.tool-container {
    max-width:700px;
    margin:80px auto;
    background:#1e293b;
    padding:30px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    text-align:center;
}

.tool-container h1 {
    text-align:center;
    margin-bottom:20px;
}

canvas {
    margin-top:20px;
    max-width:100%;
    border-radius:6px;
    cursor:crosshair;
}

button {
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:6px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
}

button:hover {
    background:#2563eb;
}

a#download {
    display:block;
    margin-top:15px;
    color:#3b82f6;
    font-weight:bold;
}

.related-tools {
    margin-top:30px;
    text-align:left;
}

.related-tools ul {
    list-style:none;
    padding:0;
}

.related-tools ul li {
    margin-bottom:10px;
}

.related-tools ul li a {
    color:#3b82f6;
    text-decoration:none;
}

.related-tools ul li a:hover {
    text-decoration:underline;
}
</style>

</head>

<body>

<header class="navbar">
<h2 class="logo">WebTools</h2>
<nav>
<a href="../index.html">Home</a>
<a href="../index.html">All Tools</a>
</nav>
</header>

<div class="tool-container">

<h1>✂️ Image Cropper</h1>

<p>Upload your image, select the area, and crop it easily.</p>

<input type="file" id="upload">

<canvas id="canvas"></canvas>

<button onclick="cropImage()">Crop & Download</button>

<a id="download" style="display:none;">Download Cropped Image</a>

<div class="related-tools">
<h2>Related Tools</h2>
<ul>
<li><a href="image-compressor.html">Image Compressor</a></li>
<li><a href="image-converter.html">Image Converter</a></li>
<li><a href="image-color-picker.html">Image Color Picker</a></li>
</ul>
</div>

</div>

<script>
let img = new Image();
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");
let startX, startY, endX, endY;

document.getElementById("upload").addEventListener("change", function(e){
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = function(event){
        img.src = event.target.result;
    }
    reader.readAsDataURL(file);
});

img.onload = function(){
    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img,0,0);
}

canvas.addEventListener("mousedown", function(e){
    const rect = canvas.getBoundingClientRect();
    startX = e.clientX - rect.left;
    startY = e.clientY - rect.top;
});

canvas.addEventListener("mouseup", function(e){
    const rect = canvas.getBoundingClientRect();
    endX = e.clientX - rect.left;
    endY = e.clientY - rect.top;
});

function cropImage(){
    let width = endX - startX;
    let height = endY - startY;

    if(width <=0 || height <=0){
        alert("Please select a valid area to crop.");
        return;
    }

    let cropped = ctx.getImageData(startX,startY,width,height);
    canvas.width = width;
    canvas.height = height;
    ctx.putImageData(cropped,0,0);

    let link = document.getElementById("download");
    link.href = canvas.toDataURL("image/png");
    link.download = "cropped-image.png";
    link.style.display = "block";
    link.innerText = "Download Cropped Image";
}
</script>

</body>
</html>
