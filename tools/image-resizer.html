<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Image Resizer - WebTools</title>
<meta name="description" content="Resize your images online easily with our free Image Resizer tool. Adjust width and height and download the resized image.">
<meta name="keywords" content="Image Resizer, Resize Image Online, Free Image Resize, PNG Resizer, JPG Resizer">
<meta name="robots" content="index, follow">

<link rel="stylesheet" href="../style.css">

<style>
.tool-container {
    max-width:700px;
    margin:80px auto;
    background:#1e293b;
    padding:30px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    text-align:center;
}

.tool-container h1 {
    text-align:center;
    margin-bottom:20px;
}

input {
    margin-top:10px;
    padding:10px;
    border:none;
    border-radius:6px;
    width:150px;
}

canvas {
    margin-top:20px;
    max-width:100%;
    border-radius:6px;
}

button {
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:6px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
}

button:hover {
    background:#2563eb;
}

a#download {
    display:block;
    margin-top:15px;
    color:#3b82f6;
    font-weight:bold;
}

.related-tools {
    margin-top:30px;
    text-align:left;
}

.related-tools ul {
    list-style:none;
    padding:0;
}

.related-tools ul li {
    margin-bottom:10px;
}

.related-tools ul li a {
    color:#3b82f6;
    text-decoration:none;
}

.related-tools ul li a:hover {
    text-decoration:underline;
}
</style>

</head>

<body>

<header class="navbar">
<h2 class="logo">WebTools</h2>
<nav>
<a href="../index.html">Home</a>
<a href="../index.html">All Tools</a>
</nav>
</header>

<div class="tool-container">

<h1>📏 Image Resizer</h1>

<p>Upload your image and set the width and height to resize it.</p>

<input type="file" id="upload">

<br>

<input type="number" id="width" placeholder="Width">
<input type="number" id="height" placeholder="Height">

<br>

<button onclick="resizeImage()">Resize Image</button>

<canvas id="canvas"></canvas>

<a id="download" style="display:none;">Download Resized Image</a>

<div class="related-tools">
<h2>Related Tools</h2>
<ul>
<li><a href="image-compressor.html">Image Compressor</a></li>
<li><a href="image-cropper.html">Image Cropper</a></li>
<li><a href="image-converter.html">Image Converter</a></li>
</ul>
</div>

</div>

<script>
let img = new Image();

document.getElementById("upload").addEventListener("change", function(e){
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = function(event){
        img.src = event.target.result;
    }
    reader.readAsDataURL(file);
});

function resizeImage(){
    let width = parseInt(document.getElementById("width").value);
    let height = parseInt(document.getElementById("height").value);

    if(!width || !height){
        alert("Please enter valid width and height.");
        return;
    }

    let canvas = document.getElementById("canvas");
    let ctx = canvas.getContext("2d");

    canvas.width = width;
    canvas.height = height;

    ctx.drawImage(img,0,0,width,height);

    let link = document.getElementById("download");
    link.href = canvas.toDataURL("image/png");
    link.download = "resized-image.png";
    link.style.display = "block";
    link.innerText = "Download Resized Image";
}
</script>

</body>
</html>
