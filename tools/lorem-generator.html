<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lorem Ipsum Generator - QuickTooles</title>

<style>
/* Body */
body{
    font-family:Arial, sans-serif;
    background:#f8fafc;
    color:#1e293b;
    margin:0;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    min-height:100vh;
    padding:50px 20px;
}

/* Container */
.container{
    background:#ffffff;
    padding:30px 40px;
    border-radius:15px;
    width:100%;
    max-width:600px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
    color:#1e293b;
}

/* Navbar / Header */
header.navbar{
    width:100%;
    background:#3b82f6;
    padding:15px 20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    text-align:center;
    color:white;
    font-size:20px;
    font-weight:bold;
    position:fixed;
    top:0;
    left:0;
    z-index:1000;
    border-radius:0 0 12px 12px;
}

/* Adjust container for fixed header */
.container{
    margin-top:90px;
}

/* Heading */
.container h2{
    color:#3b82f6;
    margin-bottom:20px;
}

/* Input */
input{
    padding:10px;
    border:1px solid #cbd5e1;
    border-radius:6px;
    width:80px;
    margin-top:10px;
    text-align:center;
    background:#f1f5f9;
    color:#1e293b;
}

/* Button */
button{
    margin-top:15px;
    padding:10px 25px;
    border:none;
    border-radius:6px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#2563eb;
}

/* Result Box */
.result{
    margin-top:20px;
    background:#f1f5f9;
    padding:15px;
    border-radius:6px;
    text-align:left;
    font-family:monospace;
    max-height:400px;
    overflow-y:auto;
    border:1px solid #cbd5e1;
    color:#1e293b;
}

/* Blog / Guidance Section */
.blog-section{
    margin-top:30px;
    padding:20px;
    background:#f1f5f9;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.05);
    text-align:left;
    font-size:15px;
    color:#1e293b;
}

.blog-section h3{
    color:#3b82f6;
    margin-bottom:10px;
}

/* Responsive */
@media(max-width:600px){
    .container{
        padding:25px 20px;
    }
}
</style>

</head>
<body>

<!-- Navbar/Header -->
<header class="navbar">QuickTooles</header>

<div class="container">

<h2>📝 Lorem Ipsum Generator</h2>

<label>Number of Paragraphs:</label>
<br>
<input type="number" id="count" value="1" min="1" max="20">
<br>
<button onclick="generateLorem()">Generate</button>

<div class="result" id="result" placeholder="Generated text will appear here..."></div>

<!-- Blog / Guidance Section -->
<div class="blog-section">
<h3>How to Use Lorem Ipsum Generator</h3>
<p>Enter the number of paragraphs you want in the input box and click "Generate". The tool will produce placeholder text instantly, which you can copy and use for design mockups, templates, or content testing.</p>
</div>

</div>

<script>
const lorem = "Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam.";

function generateLorem(){
    let count = document.getElementById("count").value;
    if(count < 1) count = 1;
    let output = "";
    for(let i=0; i<count; i++){
        output += "<p>"+lorem+"</p>";
    }
    document.getElementById("result").innerHTML = output;
}
</script>

</body>
</html>
