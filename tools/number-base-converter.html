<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Number Base Converter - WebTools</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Convert numbers between Decimal, Binary, Octal, and Hexadecimal online with WebTools.">
<meta name="keywords" content="Number Base Converter, Decimal, Binary, Octal, Hexadecimal, WebTools">
<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}
.tool-container {
    max-width: 500px;
    margin: 50px auto;
    background: #1e293b;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    text-align: center;
}
.tool-container h1 {
    margin-bottom: 20px;
}
input {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 6px;
    margin-top: 15px;
    font-size: 14px;
}
button {
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    border-radius: 6px;
    background: #3b82f6;
    color: white;
    cursor: pointer;
    font-size: 16px;
}
button:hover {
    background: #2563eb;
}
.result {
    margin-top: 20px;
    background: #0f172a;
    padding: 15px;
    border-radius: 6px;
    text-align: left;
    font-family: monospace;
    white-space: pre-wrap;
}
.related-tools {
    margin-top: 30px;
    text-align: left;
}
.related-tools ul {
    list-style: none;
    padding: 0;
}
.related-tools ul li {
    margin-bottom: 10px;
}
.related-tools ul li a {
    color: #3b82f6;
    text-decoration: none;
}
.related-tools ul li a:hover {
    text-decoration: underline;
}
</style>
</head>
<body>

<div class="tool-container">

<h1>🔢 Number Base Converter</h1>

<input type="text" id="numberInput" placeholder="Enter Decimal Number">

<button onclick="convertNumber()">Convert</button>

<div class="result" id="result">
<p>Binary: <span id="binary"></span></p>
<p>Octal: <span id="octal"></span></p>
<p>Decimal: <span id="decimal"></span></p>
<p>Hexadecimal: <span id="hex"></span></p>
</div>

<div class="related-tools">
<h2>Related Tools</h2>
<ul>
    <li><a href="calculator.html">Online Calculator</a></li>
    <li><a href="hex-to-rgb.html">Hex to RGB Converter</a></li>
    <li><a href="base64-encoder.html">Base64 Encoder</a></li>
</ul>
</div>

</div>

<script>
function convertNumber() {
    let input = document.getElementById("numberInput").value.trim();
    let num = parseInt(input);

    if(isNaN(num)){
        alert("Please enter a valid decimal number");
        return;
    }

    document.getElementById("decimal").innerText = num;
    document.getElementById("binary").innerText = num.toString(2);
    document.getElementById("octal").innerText = num.toString(8);
    document.getElementById("hex").innerText = num.toString(16).toUpperCase();
}
</script>

</body>
</html>
