<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Password Generator - WebTools</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Generate strong random passwords online using this Password Generator tool.">
<meta name="keywords" content="Password Generator, Random Password, Online Tool, WebTools">
<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}
.tool-container {
    max-width: 400px;
    margin: 50px auto;
    background: #1e293b;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    text-align: center;
}
.tool-container h1 {
    margin-bottom: 20px;
}
input[type="number"] {
    width: 80px;
    padding: 10px;
    border: none;
    border-radius: 6px;
    margin-top: 10px;
    text-align: center;
}
button {
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    border-radius: 6px;
    background: #3b82f6;
    color: white;
    cursor: pointer;
    font-size: 14px;
}
button:hover {
    background: #2563eb;
}
.result {
    margin-top: 20px;
    background: #0f172a;
    padding: 12px;
    border-radius: 6px;
    word-break: break-all;
    font-weight: bold;
}
.related-tools {
    margin-top: 30px;
    text-align: left;
}
.related-tools ul {
    list-style: none;
    padding: 0;
}
.related-tools ul li {
    margin-bottom: 10px;
}
.related-tools ul li a {
    color: #3b82f6;
    text-decoration: none;
}
.related-tools ul li a:hover {
    text-decoration: underline;
}
</style>
</head>
<body>

<div class="tool-container">

<h1>🔑 Password Generator</h1>

<label>Password Length</label>
<br>
<input type="number" id="length" value="12" min="4" max="50">
<br>
<button onclick="generatePassword()">Generate Password</button>

<div class="result" id="result">Your generated password will appear here</div>

<div class="related-tools">
<h2>Related Tools</h2>
<ul>
    <li><a href="password-strength.html">Password Strength Checker</a></li>
    <li><a href="md5-generator.html">MD5 Hash Generator</a></li>
    <li><a href="base64-encoder.html">Base64 Encoder</a></li>
</ul>
</div>

</div>

<script>
function generatePassword(){
    let length = parseInt(document.getElementById("length").value);
    let chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()";
    let password = "";
    for(let i = 0; i < length; i++){
        password += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    document.getElementById("result").innerText = password;
}
</script>

</body>
</html>
