<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Random Color Generator - WebTools</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Generate random colors online with HEX code instantly.">
<meta name="keywords" content="Random Color Generator, HEX color, CSS color generator">
<style>
body{
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
}
.container{
    background: #1e293b;
    padding: 30px;
    border-radius: 12px;
    width: 400px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}
h2{
    margin-bottom: 20px;
}
button{
    margin-top: 15px;
    padding: 12px 20px;
    border: none;
    border-radius: 6px;
    background: #3b82f6;
    color: white;
    cursor: pointer;
    font-size: 16px;
}
button:hover{
    background: #2563eb;
}
.color-box{
    margin-top: 20px;
    padding: 40px 0;
    border-radius: 8px;
    color: white;
    font-weight: bold;
    font-size: 18px;
    transition: background 0.3s;
}
.related-tools{
    margin-top: 25px;
    text-align: left;
}
.related-tools h3{
    margin-bottom: 8px;
}
.related-tools ul{
    list-style: none;
    padding-left: 0;
}
.related-tools ul li a{
    color: #3b82f6;
    text-decoration: none;
}
.related-tools ul li a:hover{
    text-decoration: underline;
}
</style>
</head>

<body>

<div class="container">

<h2>🎨 Random Color Generator</h2>

<button onclick="generateColor()">Generate Color</button>

<div class="color-box" id="colorBox">#FFFFFF</div>

<div class="related-tools">
<h3>Related Tools</h3>
<ul>
    <li><a href="hex-to-rgb.html">HEX to RGB Converter</a></li>
    <li><a href="rgb-to-hex.html">RGB to HEX Converter</a></li>
    <li><a href="color-picker.html">Image Color Picker</a></li>
</ul>
</div>

</div>

<script>
function generateColor(){
    let randomColor = '#'+Math.floor(Math.random()*16777215).toString(16).padStart(6,'0');
    let box = document.getElementById("colorBox");
    box.style.backgroundColor = randomColor;
    box.innerText = randomColor;
}
</script>

</body>
</html>
