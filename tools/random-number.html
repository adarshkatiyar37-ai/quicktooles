<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Random Number Generator - WebTools</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Generate random numbers online easily.">
<meta name="keywords" content="Random Number Generator, RNG, Number Tool, WebTools">
<style>
body{
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
}
.container{
    background: #1e293b;
    padding: 30px;
    border-radius: 12px;
    width: 400px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}
h2{
    margin-bottom: 20px;
}
input{
    width: 100px;
    padding: 10px;
    border: none;
    border-radius: 6px;
    margin: 5px;
    text-align: center;
}
button{
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    border-radius: 6px;
    background: #3b82f6;
    color: white;
    cursor: pointer;
    font-size: 16px;
}
button:hover{
    background: #2563eb;
}
.result{
    margin-top: 20px;
    background: #0f172a;
    padding: 12px;
    border-radius: 6px;
    font-size: 18px;
    font-weight: bold;
}
.related-tools{
    margin-top: 25px;
    text-align: left;
}
.related-tools h3{
    margin-bottom: 8px;
}
.related-tools ul{
    list-style: none;
    padding-left: 0;
}
.related-tools ul li a{
    color: #3b82f6;
    text-decoration: none;
}
.related-tools ul li a:hover{
    text-decoration: underline;
}
</style>
</head>

<body>

<div class="container">

<h2>🎲 Random Number Generator</h2>

<input type="number" id="min" placeholder="Min" value="1">
<input type="number" id="max" placeholder="Max" value="100">

<br>

<button onclick="generateRandom()">Generate</button>

<div class="result" id="result">Result will appear here</div>

<div class="related-tools">
<h3>Related Tools</h3>
<ul>
    <li><a href="random-color.html">Random Color Generator</a></li>
    <li><a href="percentage-calculator.html">Percentage Calculator</a></li>
    <li><a href="number-base-converter.html">Number Base Converter</a></li>
</ul>
</div>

</div>

<script>
function generateRandom(){
    let min = parseInt(document.getElementById("min").value);
    let max = parseInt(document.getElementById("max").value);

    if(isNaN(min) || isNaN(max) || min > max){
        alert("Enter valid min and max numbers");
        return;
    }

    let randomNum = Math.floor(Math.random() * (max - min + 1)) + min;
    document.getElementById("result").innerText = randomNum;
}
</script>

</body>
</html>
