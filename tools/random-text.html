<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Random Text Generator - WebTools</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Generate random text online easily.">
<meta name="keywords" content="Random Text Generator, Lorem Ipsum, Text Tool, WebTools">
<style>
body{
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
}
.container{
    background: #1e293b;
    padding: 30px;
    border-radius: 12px;
    width: 500px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}
h2{
    margin-bottom: 20px;
}
input{
    width: 80px;
    padding: 10px;
    border: none;
    border-radius: 6px;
    margin-top: 10px;
    text-align: center;
}
button{
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    border-radius: 6px;
    background: #3b82f6;
    color: white;
    cursor: pointer;
    font-size: 16px;
}
button:hover{
    background: #2563eb;
}
.result{
    margin-top: 20px;
    background: #0f172a;
    padding: 15px;
    border-radius: 6px;
    text-align: left;
    word-break: break-word;
}
.related-tools{
    margin-top: 25px;
    text-align: left;
}
.related-tools h3{
    margin-bottom: 8px;
}
.related-tools ul{
    list-style: none;
    padding-left: 0;
}
.related-tools ul li a{
    color: #3b82f6;
    text-decoration: none;
}
.related-tools ul li a:hover{
    text-decoration: underline;
}
</style>
</head>

<body>

<div class="container">

<h2>📝 Random Text Generator</h2>

<label>Number of words:</label>
<input type="number" id="words" value="20" min="1" max="200">

<br>

<button onclick="generateText()">Generate Text</button>

<div class="result" id="result"></div>

<div class="related-tools">
<h3>Related Tools</h3>
<ul>
    <li><a href="random-number.html">Random Number Generator</a></li>
    <li><a href="random-color.html">Random Color Generator</a></li>
    <li><a href="percentage-calculator.html">Percentage Calculator</a></li>
</ul>
</div>

</div>

<script>
function generateText(){
    let count = parseInt(document.getElementById("words").value);
    let chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ";
    let text = "";

    for(let i=0; i<count; i++){
        let wordLength = Math.floor(Math.random()*8)+2; // 2-10 letters per word
        let word = "";
        for(let j=0; j<wordLength; j++){
            word += chars.charAt(Math.floor(Math.random()*chars.length));
        }
        text += word + " ";
    }

    document.getElementById("result").innerText = text.trim();
}
</script>

</body>
</html>
