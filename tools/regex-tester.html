<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Regex Tester - WebTools</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Test your regular expressions online with live results.">
<meta name="keywords" content="Regex Tester, Regular Expression, JS Regex, WebTools">
<style>
body{
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}
.container{
    background: #1e293b;
    padding: 30px;
    border-radius: 12px;
    width: 600px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}
h2{
    margin-bottom: 20px;
}
textarea, input{
    width: 90%;
    padding: 12px;
    border: none;
    border-radius: 6px;
    margin-top: 10px;
    font-family: monospace;
}
textarea{
    resize: none;
}
button{
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    border-radius: 6px;
    background: #3b82f6;
    color: white;
    cursor: pointer;
    font-size: 16px;
}
button:hover{
    background: #2563eb;
}
.result{
    margin-top: 20px;
    background: #0f172a;
    padding: 15px;
    border-radius: 6px;
    text-align: left;
    word-break: break-word;
}
.related-tools{
    margin-top: 25px;
    text-align: left;
}
.related-tools h3{
    margin-bottom: 8px;
}
.related-tools ul{
    list-style: none;
    padding-left: 0;
}
.related-tools ul li a{
    color: #3b82f6;
    text-decoration: none;
}
.related-tools ul li a:hover{
    text-decoration: underline;
}
</style>
</head>

<body>

<div class="container">

<h2>🔍 Regex Tester</h2>

<label>Enter Text:</label>
<textarea id="text" rows="5" placeholder="Enter your text here"></textarea>

<label>Enter Regex:</label>
<input type="text" id="regex" placeholder="e.g. \d+">

<br>
<button onclick="testRegex()">Test Regex</button>

<div class="result" id="result">Matches will appear here</div>

<div class="related-tools">
<h3>Related Tools</h3>
<ul>
    <li><a href="js-minifier.html">JS Minifier</a></li>
    <li><a href="json-formatter.html">JSON Formatter</a></li>
    <li><a href="regex-tester.html">Regex Tester</a></li>
</ul>
</div>

</div>

<script>
function testRegex(){
    let text = document.getElementById("text").value;
    let pattern = document.getElementById("regex").value;

    try{
        let regex = new RegExp(pattern,'g');
        let matches = text.match(regex);
        if(matches && matches.length > 0){
            document.getElementById("result").innerText = "Matches: " + matches.join(", ");
        } else {
            document.getElementById("result").innerText = "No matches found.";
        }
    } catch(e){
        document.getElementById("result").innerText = "Invalid Regex!";
    }
}
</script>

</body>
</html>
