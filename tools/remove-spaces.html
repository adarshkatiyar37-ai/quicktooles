<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Remove Extra Spaces</title>

<style>
body{
font-family:Arial, sans-serif;
background:#0f172a;
color:white;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:#1e293b;
padding:30px;
border-radius:10px;
width:500px;
text-align:center;
}

textarea{
width:90%;
padding:12px;
border:none;
border-radius:6px;
margin-top:10px;
resize:none;
}

button{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:6px;
background:#3b82f6;
color:white;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#2563eb;
}

.result{
margin-top:20px;
background:#0f172a;
padding:15px;
border-radius:6px;
text-align:left;
word-break:break-word;
}
</style>
</head>

<body>

<div class="container">

<h2>Remove Extra Spaces</h2>

<textarea id="text" rows="5" placeholder="Enter your text here"></textarea>

<br>

<button onclick="removeSpaces()">Remove Spaces</button>

<div class="result" id="result">Result will appear here</div>

</div>

<script>
function removeSpaces(){
let text = document.getElementById("text").value;

// Replace multiple spaces, tabs, newlines with single space
let result = text.replace(/\s+/g,' ').trim();

document.getElementById("result").innerText = result;
}
</script>

</body>
</html>
