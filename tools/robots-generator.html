<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Robots.txt Generator - WebTools</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Easily generate your robots.txt file to control search engine crawlers.">
<meta name="keywords" content="Robots.txt Generator, SEO Tools, WebTools">
<style>
body{
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}
.container{
    background: #1e293b;
    padding: 30px;
    border-radius: 12px;
    width: 500px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}
h2{
    margin-bottom: 20px;
}
input, select, textarea{
    width: 90%;
    padding: 12px;
    border: none;
    border-radius: 6px;
    margin-top: 10px;
    font-family: monospace;
}
textarea{
    resize: none;
    height: 80px;
}
button{
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    border-radius: 6px;
    background: #3b82f6;
    color: white;
    cursor: pointer;
    font-size: 16px;
}
button:hover{
    background: #2563eb;
}
.result{
    margin-top: 20px;
    background: #0f172a;
    padding: 15px;
    border-radius: 6px;
    text-align: left;
    white-space: pre-wrap;
}
.related-tools{
    margin-top: 25px;
    text-align: left;
}
.related-tools h3{
    margin-bottom: 8px;
}
.related-tools ul{
    list-style: none;
    padding-left: 0;
}
.related-tools ul li a{
    color: #3b82f6;
    text-decoration: none;
}
.related-tools ul li a:hover{
    text-decoration: underline;
}
</style>
</head>

<body>

<div class="container">

<h2>🤖 Robots.txt Generator</h2>

<label>User-Agent:</label>
<input type="text" id="userAgent" placeholder="*">

<label>Disallow (comma separated):</label>
<input type="text" id="disallow" placeholder="/private/, /tmp/">

<label>Allow (comma separated):</label>
<input type="text" id="allow" placeholder="/public/, /images/">

<br>
<button onclick="generateRobots()">Generate</button>

<div class="result" id="result">Generated robots.txt will appear here</div>

<br>
<a id="download" style="display:none;color:#3b82f6;">Download robots.txt</a>

<div class="related-tools">
<h3>Related Tools</h3>
<ul>
    <li><a href="meta-tag-generator.html">Meta Tag Generator</a></li>
    <li><a href="sitemap-generator.html">Sitemap Generator</a></li>
    <li><a href="seo-analyzer.html">SEO Analyzer</a></li>
</ul>
</div>

</div>

<script>
function generateRobots(){
    let userAgent = document.getElementById("userAgent").value || "*";
    let disallow = document.getElementById("disallow").value.split(',').map(s=>s.trim()).filter(Boolean);
    let allow = document.getElementById("allow").value.split(',').map(s=>s.trim()).filter(Boolean);

    let content = `User-agent: ${userAgent}\n`;

    disallow.forEach(path => {
        content += `Disallow: ${path}\n`;
    });

    allow.forEach(path => {
        content += `Allow: ${path}\n`;
    });

    document.getElementById("result").innerText = content;

    // Download link
    let blob = new Blob([content], {type:"text/plain"});
    let url = URL.createObjectURL(blob);

    let link = document.getElementById("download");
    link.href = url;
    link.download = "robots.txt";
    link.style.display = "block";
    link.innerText = "Download robots.txt";
}
</script>

</body>
</html>
