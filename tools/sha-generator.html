<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SHA Generator - WebTools</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Generate SHA-1, SHA-256, or SHA-512 hashes of your text easily.">
<meta name="keywords" content="SHA Generator, SHA-256, SHA-512, SHA-1, Hash Generator, WebTools">
<style>
body{
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}
.container{
    background: #1e293b;
    padding: 30px;
    border-radius: 12px;
    width: 500px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}
h2{
    margin-bottom: 20px;
}
input, select, textarea{
    width: 90%;
    padding: 12px;
    border: none;
    border-radius: 6px;
    margin-top: 10px;
    font-family: monospace;
}
textarea{
    resize: none;
    height: 80px;
}
button{
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    border-radius: 6px;
    background: #3b82f6;
    color: white;
    cursor: pointer;
    font-size: 16px;
}
button:hover{
    background: #2563eb;
}
.result{
    margin-top: 20px;
    background: #0f172a;
    padding: 15px;
    border-radius: 6px;
    text-align: left;
    word-break: break-word;
}
.related-tools{
    margin-top: 25px;
    text-align: left;
}
.related-tools h3{
    margin-bottom: 8px;
}
.related-tools ul{
    list-style: none;
    padding-left: 0;
}
.related-tools ul li a{
    color: #3b82f6;
    text-decoration: none;
}
.related-tools ul li a:hover{
    text-decoration: underline;
}
</style>
</head>

<body>

<div class="container">

<h2>🔐 SHA Generator</h2>

<label>Enter Text:</label>
<textarea id="text" rows="4" placeholder="Enter text here"></textarea>

<label>Select SHA Type:</label>
<select id="shaType">
<option value="SHA-1">SHA-1</option>
<option value="SHA-256" selected>SHA-256</option>
<option value="SHA-512">SHA-512</option>
</select>

<br>

<button onclick="generateSHA()">Generate SHA</button>

<div class="result" id="result">Hash will appear here</div>

<div class="related-tools">
<h3>Related Tools</h3>
<ul>
    <li><a href="md5-generator.html">MD5 Generator</a></li>
    <li><a href="base64-encoder.html">Base64 Encoder</a></li>
    <li><a href="password-generator.html">Password Generator</a></li>
</ul>
</div>

</div>

<script>
async function generateSHA(){
    let text = document.getElementById("text").value;
    let type = document.getElementById("shaType").value;

    if(!text){
        alert("Please enter text to hash");
        return;
    }

    let encoder = new TextEncoder();
    let data = encoder.encode(text);
    let hashBuffer = await crypto.subtle.digest(type, data);
    let hashArray = Array.from(new Uint8Array(hashBuffer));
    let hashHex = hashArray.map(b => b.toString(16).padStart(2,'0')).join('');

    document.getElementById("result").innerText = hashHex;
}
</script>

</body>
</html>
