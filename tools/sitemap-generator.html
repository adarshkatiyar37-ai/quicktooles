<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sitemap Generator - WebTools</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Generate XML sitemaps for your website easily.">
<meta name="keywords" content="Sitemap Generator, XML Sitemap, SEO Tools, WebTools">
<style>
body{
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}
.container{
    background: #1e293b;
    padding: 30px;
    border-radius: 12px;
    width: 600px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}
h2{
    margin-bottom: 20px;
}
textarea{
    width: 90%;
    padding: 12px;
    border: none;
    border-radius: 6px;
    margin-top: 10px;
    resize: none;
    font-family: monospace;
    height: 120px;
}
button{
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    border-radius: 6px;
    background: #3b82f6;
    color: white;
    cursor: pointer;
    font-size: 16px;
}
button:hover{
    background: #2563eb;
}
.result{
    margin-top: 20px;
    background: #0f172a;
    padding: 15px;
    border-radius: 6px;
    text-align: left;
    white-space: pre-wrap;
    font-family: monospace;
}
.related-tools{
    margin-top: 25px;
    text-align: left;
}
.related-tools h3{
    margin-bottom: 8px;
}
.related-tools ul{
    list-style: none;
    padding-left: 0;
}
.related-tools ul li a{
    color: #3b82f6;
    text-decoration: none;
}
.related-tools ul li a:hover{
    text-decoration: underline;
}
</style>
</head>

<body>

<div class="container">

<h2>🗂 Sitemap Generator</h2>

<label>Enter URLs (one per line):</label>
<textarea id="urls" placeholder="https://example.com/page1&#10;https://example.com/page2"></textarea>

<br>

<button onclick="generateSitemap()">Generate Sitemap</button>

<div class="result" id="result">Generated sitemap will appear here</div>

<div class="related-tools">
<h3>Related Tools</h3>
<ul>
    <li><a href="robots-generator.html">Robots.txt Generator</a></li>
    <li><a href="meta-generator.html">Meta Tag Generator</a></li>
    <li><a href="base64-encoder.html">Base64 Encoder</a></li>
</ul>
</div>

<br>
<a id="download" style="display:none;color:#3b82f6;">Download sitemap.xml</a>

</div>

<script>
function generateSitemap(){
    let urls = document.getElementById("urls").value.split('\n').map(u => u.trim()).filter(Boolean);

    if(urls.length === 0){
        alert("Please enter at least one URL");
        return;
    }

    let xml = '<?xml version="1.0" encoding="UTF-8"?>\n';
    xml += '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n';

    urls.forEach(url=>{
        xml += `  <url>\n    <loc>${url}</loc>\n  </url>\n`;
    });

    xml += '</urlset>';

    document.getElementById("result").innerText = xml;

    // Download link
    let blob = new Blob([xml], {type:"text/xml"});
    let link = document.getElementById("download");
    link.href = URL.createObjectURL(blob);
    link.download = "sitemap.xml";
    link.style.display = "block";
    link.innerText = "Download sitemap.xml";
}
</script>

</body>
</html>
