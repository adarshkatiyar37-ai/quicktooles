<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Text Sorter - WebTools</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Sort lines of text alphabetically using this online Text Sorter tool.">
<meta name="keywords" content="Text Sorter, Sort Text, Alphabetical Sort, Online Tools, WebTools">
<style>
body{
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}
.container{
    background: #1e293b;
    padding: 30px;
    border-radius: 12px;
    width: 500px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}
h2{
    margin-bottom: 20px;
}
textarea{
    width: 90%;
    padding: 12px;
    border: none;
    border-radius: 6px;
    margin-top: 10px;
    resize: none;
    font-family: monospace;
    height: 120px;
}
button{
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    border-radius: 6px;
    background: #3b82f6;
    color: white;
    cursor: pointer;
    font-size: 16px;
}
button:hover{
    background: #2563eb;
}
.result{
    margin-top: 20px;
    background: #0f172a;
    padding: 15px;
    border-radius: 6px;
    text-align: left;
    word-break: break-word;
    font-family: monospace;
}
.related-tools{
    margin-top: 25px;
    text-align: left;
}
.related-tools h3{
    margin-bottom: 8px;
}
.related-tools ul{
    list-style: none;
    padding-left: 0;
}
.related-tools ul li a{
    color: #3b82f6;
    text-decoration: none;
}
.related-tools ul li a:hover{
    text-decoration: underline;
}
</style>
</head>

<body>

<div class="container">

<h2>📝 Text Sorter</h2>

<textarea id="text" placeholder="Enter text, each line will be sorted"></textarea>

<br>

<button onclick="sortText()">Sort Text</button>

<div class="result" id="result">Sorted text will appear here</div>

<div class="related-tools">
<h3>Related Tools</h3>
<ul>
    <li><a href="text-reverser.html">Text Reverser</a></li>
    <li><a href="remove-spaces.html">Remove Extra Spaces</a></li>
    <li><a href="random-text.html">Random Text Generator</a></li>
</ul>
</div>

</div>

<script>
function sortText(){
    let text = document.getElementById("text").value;
    let lines = text.split('\n').map(l => l.trim()).filter(Boolean);
    lines.sort((a,b) => a.localeCompare(b));
    document.getElementById("result").innerText = lines.join('\n');
}
</script>

</body>
</html>
