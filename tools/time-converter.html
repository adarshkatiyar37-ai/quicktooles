<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Time Converter - WebTools</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Convert hours, minutes, and seconds easily using this online Time Converter tool.">
<meta name="keywords" content="Time Converter, Hours to Minutes, Minutes to Seconds, Online Tools, WebTools">
<style>
body{
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}
.container{
    background: #1e293b;
    padding: 30px;
    border-radius: 12px;
    width: 500px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}
h2{
    margin-bottom: 20px;
}
input, select{
    width: 80%;
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 6px;
    text-align: center;
    font-size: 16px;
}
button{
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    border-radius: 6px;
    background: #3b82f6;
    color: white;
    cursor: pointer;
    font-size: 16px;
}
button:hover{
    background: #2563eb;
}
.result{
    margin-top: 20px;
    background: #0f172a;
    padding: 15px;
    border-radius: 6px;
    text-align: center;
    font-weight: bold;
    font-size: 16px;
}
.related-tools{
    margin-top: 25px;
    text-align: left;
}
.related-tools h3{
    margin-bottom: 8px;
}
.related-tools ul{
    list-style: none;
    padding-left: 0;
}
.related-tools ul li a{
    color: #3b82f6;
    text-decoration: none;
}
.related-tools ul li a:hover{
    text-decoration: underline;
}
</style>
</head>

<body>

<div class="container">

<h2>⏱ Time Converter</h2>

<input type="number" id="value" placeholder="Enter value" min="0">

<br>

<select id="unitFrom">
    <option value="hours">Hours</option>
    <option value="minutes">Minutes</option>
    <option value="seconds">Seconds</option>
</select>

<select id="unitTo">
    <option value="hours">Hours</option>
    <option value="minutes">Minutes</option>
    <option value="seconds">Seconds</option>
</select>

<br>

<button onclick="convertTime()">Convert</button>

<div class="result" id="result">Result will appear here</div>

<div class="related-tools">
<h3>Related Tools</h3>
<ul>
    <li><a href="number-base-converter.html">Number Base Converter</a></li>
    <li><a href="percentage-calculator.html">Percentage Calculator</a></li>
</ul>
</div>

</div>

<script>
function convertTime(){
    let val = parseFloat(document.getElementById("value").value);
    let from = document.getElementById("unitFrom").value;
    let to = document.getElementById("unitTo").value;

    if(isNaN(val)){
        alert("Enter a valid number");
        return;
    }

    // Convert input to seconds first
    let seconds;
    if(from==="hours") seconds = val*3600;
    else if(from==="minutes") seconds = val*60;
    else seconds = val;

    // Convert seconds to target unit
    let result;
    if(to==="hours") result = seconds/3600;
    else if(to==="minutes") result = seconds/60;
    else result = seconds;

    document.getElementById("result").innerText = `${val} ${from} = ${result} ${to}`;
}
</script>

</body>
</html>
