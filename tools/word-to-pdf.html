<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word to PDF Converter – Convert DOCX to PDF Online | QuickTooles</title>

<meta name="description" content="Free online Word to PDF Converter. Convert DOCX files to professional PDF documents instantly with our secure, browser-based tool. 100% private, no server uploads, and high-quality formatting preservation.">
<meta name="keywords" content="word to pdf, convert docx to pdf, word file to pdf converter, online document converter, free docx to pdf, secure pdf maker, quicktooles">
<meta name="author" content="QuickTooles">
<meta name="robots" content="index, follow">

<link rel="canonical" href="https://quicktooles.in/tools/word-to-pdf">
<link rel="icon" type="image/png" href="../logo.png">

<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
--primary:#ef4444;
--primary-dark:#b91c1c;
--secondary:#0f172a;
--bg-light:#f8fafc;
--card-bg:#ffffff;
--text-main:#334155;
--text-light:#64748b;
--border:#e2e8f0;
--success:#10b981;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}

body{background:var(--bg-light);color:var(--text-main)}

.tool-workspace{
background:white;
padding:40px;
border-radius:20px;
border-top:5px solid var(--primary)
}

.upload-area{
border:2px dashed var(--primary);
background:#fef2f2;
padding:60px;
text-align:center;
cursor:pointer
}

.btn-select{
background:var(--primary);
color:white;
padding:14px 30px;
border:none;
border-radius:10px;
font-weight:700;
cursor:pointer
}

.file-list{margin-top:30px;display:none}

.action-bar{
display:none;
margin-top:30px;
gap:15px;
}

.btn-convert{
background:var(--success);
color:white;
padding:16px 35px;
border:none;
border-radius:12px;
font-weight:700;
cursor:pointer
}

.btn-secondary{
background:#e2e8f0;
padding:16px 25px;
border:none;
border-radius:10px;
cursor:pointer
}

/* FIXED PREVIEW AREA */

#previewArea{
position:absolute;
left:-9999px;
top:0;
display:block;
}

</style>
</head>

<body>

<div class="tool-workspace">

<div class="upload-area" onclick="document.getElementById('fileInput').click()">

<h2>Upload Word File</h2>
<br>
<button class="btn-select">Select Word File</button>

<input type="file" id="fileInput" accept=".docx" onchange="handleFile(event)" hidden>

</div>

<div class="file-list" id="fileList">

<p><b id="displayFileName"></b></p>
<p id="displayFileSize"></p>

</div>

<div id="previewArea"></div>

<div class="action-bar" id="actionBar">

<button class="btn-convert" onclick="downloadPDF()">Convert & Download PDF</button>

<button class="btn-secondary" onclick="resetTool()">Choose Different File</button>

</div>

</div>

<script>

function handleFile(event){

const file=event.target.files[0]

if(!file) return

document.getElementById("fileList").style.display="block"

document.getElementById("displayFileName").innerText=file.name

document.getElementById("displayFileSize").innerText=(file.size/1024).toFixed(2)+" KB"

const reader=new FileReader()

reader.onload=function(e){

const arrayBuffer=e.target.result

mammoth.convertToHtml({arrayBuffer:arrayBuffer})

.then(function(result){

const preview=document.getElementById("previewArea")

preview.innerHTML=result.value

/* WAIT FOR RENDER */

setTimeout(()=>{

document.getElementById("actionBar").style.display="flex"

},300)

})

.catch(function(){

alert("Only DOCX files supported")

resetTool()

})

}

reader.readAsArrayBuffer(file)

}

function downloadPDF(){

const element=document.getElementById("previewArea")

if(element.innerHTML.trim()===""){

alert("Document not ready")

return

}

const fileName=document.getElementById("displayFileName").innerText.replace(".docx",".pdf")

const opt={

margin:0.5,

filename:fileName,

image:{type:'jpeg',quality:0.98},

html2canvas:{scale:3},

jsPDF:{unit:'in',format:'letter',orientation:'portrait'}

}

html2pdf().set(opt).from(element).save()

}

function resetTool(){

document.getElementById("fileInput").value=""

document.getElementById("fileList").style.display="none"

document.getElementById("actionBar").style.display="none"

}

</script>

</body>
</html>
